<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PallleteGen™</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg%20width%3D%22100%25%22%20height%3D%22100%25%22%20viewBox%3D%220%200%2046%2044%22%20version%3D%221.1%22%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20xmlns%3Axlink%3D%22http%3A%2F%2Fwww.w3.org%2F1999%2Fxlink%22%20xml%3Aspace%3D%22preserve%22%20xmlns%3Aserif%3D%22http%3A%2F%2Fwww.serif.com%2F%22%20style%3D%22fill-rule%3Aevenodd%3Bclip-rule%3Aevenodd%3Bstroke-linejoin%3Around%3Bstroke-miterlimit%3A2%3B%22%3E%3Cg%3E%3Crect%20x%3D%22-0%22%20y%3D%220%22%20width%3D%229.379%22%20height%3D%2243.245%22%20style%3D%22fill%3A%23d85870%3Bfill-rule%3Anonzero%3B%22%2F%3E%3Crect%20x%3D%2218.141%22%20y%3D%220%22%20width%3D%229.379%22%20height%3D%2243.245%22%20style%3D%22fill%3A%234dcf63%3Bfill-rule%3Anonzero%3B%22%2F%3E%3Crect%20x%3D%2236.281%22%20y%3D%220%22%20width%3D%229.379%22%20height%3D%2243.245%22%20style%3D%22fill%3A%23438fdf%3Bfill-rule%3Anonzero%3B%22%2F%3E%3C%2Fg%3E%3C%2Fsvg%3E">
  <style>
    :root {
      color-scheme: light;
      --ink: #15171c;
      --muted: #687386;
      --line: #d7dde8;
      --panel: #ffffff;
      --panel-rgb: 255, 255, 255;
      --page: #edf1f7;
      --control: #ffffff;
      --control-soft: #f7f9fc;
      --control-hover: #ffffff;
      --button-bg: rgba(255, 255, 255, 0.9);
      --button-border-hover: #aab5c5;
      --accent: #1267d8;
      --accent-dark: #0c4fa9;
      --save-ink: #0c5748;
      --editor-bg: rgba(255, 255, 255, 0.96);
      --mint: #1d8b73;
      --danger: #b93030;
      --shadow: 0 20px 70px rgba(31, 42, 58, 0.14);
      --drag-shadow: 0 18px 46px rgba(21, 23, 28, 0.28);
      --page-wash: linear-gradient(135deg, rgba(255, 255, 255, 0.9), rgba(237, 241, 247, 0.82));
      --page-blue: radial-gradient(circle at 9% 5%, rgba(18, 103, 216, 0.16), transparent 30%);
      --page-green: radial-gradient(circle at 92% 16%, rgba(29, 139, 115, 0.12), transparent 28%);
    }

    body.dark-mode {
      color-scheme: dark;
      --ink: #edf3ff;
      --muted: #a9b5c7;
      --line: #344155;
      --panel: #2a2b31;
      --panel-rgb: 42, 43, 49;
      --page: #232429;
      --control: #232429;
      --control-soft: #2e3036;
      --control-hover: #34363d;
      --button-bg: rgba(35, 36, 41, 0.92);
      --button-border-hover: #607086;
      --accent: #62a2ff;
      --accent-dark: #4388e9;
      --save-ink: #7ee0c9;
      --editor-bg: rgba(35, 36, 41, 0.97);
      --danger: #ff8585;
      --shadow: 0 22px 80px rgba(0, 0, 0, 0.36);
      --drag-shadow: 0 18px 50px rgba(0, 0, 0, 0.52);
      --page-wash: linear-gradient(135deg, rgba(35, 36, 41, 0.96), rgba(42, 43, 49, 0.9));
      --page-blue: radial-gradient(circle at 9% 5%, rgba(98, 162, 255, 0.14), transparent 30%);
      --page-green: radial-gradient(circle at 92% 16%, rgba(126, 224, 201, 0.1), transparent 28%);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        var(--page-wash),
        var(--page-blue),
        var(--page-green),
        var(--page);
      transition: color 180ms ease, background 180ms ease;
    }

    button,
    input,
    select {
      font: inherit;
    }

    .app {
      width: min(1400px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0;
    }

    .topbar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 18px;
      align-items: center;
      margin-bottom: 18px;
    }

    .brand-logo {
      display: block;
      width: min(320px, 100%);
      line-height: 0;
    }

    .brand-logo-svg {
      display: block;
      width: 100%;
      height: auto;
    }

    .brand-logo-dark {
      display: none;
    }

    body.dark-mode .brand-logo-light {
      display: none;
    }

    body.dark-mode .brand-logo-dark {
      display: block;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 10px;
      align-items: center;
    }

    .toolbar-secondary {
      display: contents;
    }

    .palette-generate-group {
      display: inline-flex;
      gap: 6px;
      align-items: center;
      margin-right: 8px;
    }

    .harmony-picker {
      position: relative;
      display: inline-grid;
      width: 42px;
      height: 42px;
      flex: 0 0 42px;
    }

    .harmony-picker svg {
      position: absolute;
      top: 11px;
      left: 11px;
      width: 20px;
      height: 20px;
      fill: none;
      stroke: var(--ink);
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-width: 2.2;
      pointer-events: none;
    }

    .control-select {
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 36px 0 12px;
      color: var(--ink);
      background: var(--button-bg);
      cursor: pointer;
    }

    .harmony-select {
      width: 100%;
      height: 42px;
      padding: 0;
      color: transparent;
      appearance: none;
    }

    .harmony-select:focus {
      color: transparent;
    }

    .harmony-select optgroup,
    .harmony-select option {
      color: #15171c;
      background: #ffffff;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 14px;
      color: var(--ink);
      background: var(--button-bg);
      cursor: pointer;
      transition: transform 150ms ease, border-color 150ms ease, background 150ms ease, box-shadow 150ms ease;
      white-space: nowrap;
    }

    .button:hover {
      transform: translateY(-1px);
      border-color: var(--button-border-hover);
      background: var(--control-hover);
      box-shadow: 0 8px 20px rgba(31, 42, 58, 0.08);
    }

    .button.primary {
      border-color: var(--accent);
      color: #fff;
      background: var(--accent);
    }

    .button.primary:hover {
      background: var(--accent-dark);
    }

    .button svg {
      width: 18px;
      height: 18px;
      flex: 0 0 18px;
      fill: none;
      stroke: currentColor;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-width: 2.2;
    }

    .button.danger {
      color: var(--danger);
    }

    .button.icon {
      width: 38px;
      min-width: 38px;
      min-height: 38px;
      padding: 0;
      border-radius: 8px;
    }

    .button.icon svg {
      width: 18px;
      height: 18px;
      fill: none;
      stroke: currentColor;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-width: 2.2;
    }

    .button.theme-toggle {
      width: 42px;
      min-width: 42px;
      min-height: 42px;
      padding: 0;
    }

    .theme-toggle-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      padding-left: 10px;
      border-left: 1.5px solid var(--line);
    }

    .tool-group-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 0 10px;
      border-left: 1.5px solid var(--line);
      border-right: 1.5px solid var(--line);
    }

    .toolbar .button.icon {
      width: 42px;
      min-width: 42px;
      min-height: 42px;
    }

    .button.theme-toggle svg {
      width: 18px;
      height: 18px;
      fill: none;
      stroke: currentColor;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-width: 2.2;
    }

    .button:disabled {
      opacity: 0.42;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    /* Export dropdown */
    .export-wrap {
      position: relative;
      display: inline-flex;
    }

    .export-dropdown {
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      z-index: 100;
      min-width: 210px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--panel);
      box-shadow: var(--shadow);
      padding: 6px;
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .export-dropdown[hidden] {
      display: none;
    }

    .export-option {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 9px 12px;
      border: none;
      border-radius: 7px;
      background: transparent;
      color: var(--ink);
      font: inherit;
      font-size: 0.88rem;
      text-align: left;
      cursor: pointer;
      transition: background 120ms ease;
    }

    .export-option:hover {
      background: var(--control-soft);
    }

    .export-option svg {
      width: 16px;
      height: 16px;
      flex: 0 0 16px;
      opacity: 0.7;
    }

    .export-divider {
      height: 1px;
      background: var(--line);
      margin: 4px 6px;
    }

    .export-section-label {
      padding: 6px 12px 3px;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--muted);
      pointer-events: none;
      user-select: none;
    }

    .workspace {
      display: grid;
      grid-template-columns: 1fr;
      gap: 18px;
      align-items: start;
    }

    .palette-shell,
    .saved-panel {
      overflow: hidden;
      border: 1px solid rgba(151, 161, 181, 0.38);
      border-radius: 8px;
      background: rgba(var(--panel-rgb), 0.86);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .palette {
      display: grid;
      grid-template-columns: repeat(var(--count), minmax(88px, 1fr));
      min-height: clamp(420px, 62vh, 680px);
    }

    .swatch {
      position: relative;
      display: flex;
      min-width: 0;
      flex-direction: column;
      justify-content: space-between;
      padding: 16px 12px;
      color: var(--label-color);
      background: var(--swatch-color);
      cursor: pointer;
      transition: background-color 180ms ease, box-shadow 160ms ease, filter 160ms ease, transform 160ms ease;
    }

    .swatch-drag-zone {
      flex: 1;
      min-height: 0;
      cursor: grab;
    }

    .swatch-drag-zone:active {
      cursor: grabbing;
    }

    .swatch-original-strip {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 50%;
      background: var(--original-color);
      pointer-events: none;
      z-index: 0;
    }

    .swatch-original-strip::after {
      content: "";
    }

    .swatch:first-child .swatch-original-strip::after {
      content: "before";
      position: absolute;
      bottom: 4px;
      left: 8px;
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      opacity: 0.52;
      color: var(--original-label);
    }

    .swatch-after-label {
      position: absolute;
      top: 50%;
      left: 8px;
      margin-top: 4px;
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      opacity: 0.52;
      pointer-events: none;
      z-index: 0;
    }

    .swatch-divider {
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      height: 1.5px;
      background: rgba(128,128,128,0.35);
      pointer-events: none;
      z-index: 1;
    }

    .swatch > *:not(.swatch-original-strip):not(.swatch-divider):not(.swatch-after-label):not(.swatch-actions) {
      position: relative;
      z-index: 2;
    }

    .swatch:hover {
      filter: saturate(1.05);
    }

    .swatch.dragging {
      opacity: 0.72;
      filter: saturate(0.86);
      transform: scale(0.985);
      box-shadow: inset 0 0 0 2px rgba(255, 255, 255, 0.36);
    }

    .swatch.drag-over {
      z-index: 1;
      box-shadow: inset 0 0 0 4px rgba(255, 255, 255, 0.72), inset 0 0 0 7px rgba(21, 23, 28, 0.18);
    }

    .drag-preview {
      position: fixed;
      top: -120px;
      left: -120px;
      display: grid;
      gap: 5px;
      width: 122px;
      border: 1px solid rgba(255, 255, 255, 0.5);
      border-radius: 8px;
      padding: 12px;
      color: var(--drag-label-color);
      background: var(--drag-color);
      box-shadow: var(--drag-shadow);
      pointer-events: none;
    }

    .drag-preview::before {
      content: "";
      width: 28px;
      height: 4px;
      border-radius: 999px;
      background: currentColor;
      opacity: 0.58;
    }

    .drag-preview strong,
    .drag-preview span {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .drag-preview strong {
      font-size: 0.78rem;
    }

    .drag-preview span {
      font-size: 0.72rem;
      opacity: 0.86;
    }

    .swatch {
      container-type: inline-size;
      container-name: swatch;
    }

    .swatch-actions {
      display: flex;
      position: absolute;
      bottom: calc(var(--info-height, 64px) - 12px);
      left: 50%;
      transform: translateX(-50%);
      flex-direction: column-reverse;
      align-items: center;
      gap: 4px;
      opacity: 0;
      transition: opacity 140ms ease;
      z-index: 3;
      pointer-events: none;
    }

    .swatch:hover .swatch-actions,
    .swatch-actions:hover {
      opacity: 1;
      pointer-events: auto;
    }

    /* When locked: always show the action panel so lock btn stays visible */
    .swatch.has-locked .swatch-actions {
      opacity: 1;
      pointer-events: auto;
    }

    /* When locked and not hovered: hide everything except the lock button */
    .swatch.has-locked:not(:hover) .swatch-actions .button.icon:not(.lock-btn-locked) {
      opacity: 0;
      pointer-events: none;
    }

    .lock-btn-alone {
      display: none;
    }

    .swatch-actions .button.icon {
      pointer-events: auto;
      transition: opacity 140ms ease, transform 150ms ease, border-color 150ms ease, background 150ms ease, box-shadow 150ms ease;
    }

    .swatch-actions .copy-hex-button {
      margin-left: 0;
    }

    .swatch .button.icon {
      width: 38px;
      min-width: 38px;
      min-height: 38px;
      border: none;
      background: transparent;
      backdrop-filter: none;
      box-shadow: none;
      color: var(--label-color);
    }

    .swatch .button.icon:hover {
      background: rgba(128,128,128,0.2);
    }

    .move-btn {
      cursor: grab;
    }

    .move-btn:active {
      cursor: grabbing;
    }

    .color-info {
      display: grid;
      gap: 8px;
      padding-top: 56px;
    }

    .swatch-name,
    .hex-field,
    .rgb-value {
      width: 100%;
      min-width: 0;
      border: 0;
      border-radius: 0;
      padding: 0;
      color: var(--label-color);
      background: transparent;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 0;
      outline: none;
      appearance: none;
      cursor: copy;
      user-select: text;
      -webkit-user-select: text;
    }

    .swatch-name,
    .rgb-value {
      cursor: text;
      text-transform: none;
      font-size: 0.78rem;
      line-height: 1.25;
      text-align: center;
      opacity: 0.72;
      white-space: pre-line;
    }

    button.swatch-name.swatch-info-trigger {
      cursor: pointer;
      border: none;
      background: transparent;
    }

    button.swatch-name.swatch-info-trigger:hover {
      opacity: 1;
    }

    /* ── Swatch info picker modal ───────────────────────────────────── */
    .swatch-info-overlay {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      background: rgba(21, 23, 28, 0.48);
      backdrop-filter: blur(3px);
    }

    .swatch-info-overlay[hidden] { display: none; }

    .swatch-info-dialog {
      width: min(340px, 100%);
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--panel);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .swatch-info-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--line);
    }

    .swatch-info-header h2 {
      margin: 0;
      font-size: 0.95rem;
    }

    .swatch-info-options {
      display: grid;
      gap: 4px;
      padding: 10px;
    }

    .swatch-info-option-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .swatch-info-option {
      display: flex;
      align-items: center;
      gap: 12px;
      flex: 1;
      min-width: 0;
      padding: 10px 12px;
      border: 1px solid transparent;
      border-radius: 8px;
      background: transparent;
      color: var(--ink);
      font: inherit;
      font-size: 0.88rem;
      text-align: left;
      cursor: pointer;
      transition: background 120ms ease, border-color 120ms ease;
    }

    .swatch-info-option:hover {
      background: var(--control-soft);
    }

    .swatch-info-option.active {
      background: var(--control-soft);
      border-color: var(--accent);
      color: var(--accent);
    }

    .swatch-info-option-check {
      width: 16px;
      height: 16px;
      flex: 0 0 16px;
      margin-left: auto;
      opacity: 0;
    }

    .swatch-info-option.active .swatch-info-option-check {
      opacity: 1;
    }

    .swatch-info-copy-btn {
      flex: 0 0 32px;
      width: 32px;
      min-width: 32px !important;
      min-height: 32px !important;
      padding: 0;
      opacity: 0.5;
      transition: opacity 120ms ease, border-color 150ms ease, background 150ms ease;
    }

    .swatch-info-copy-btn:hover {
      opacity: 1;
    }

    .swatch-info-copy-btn svg {
      width: 15px;
      height: 15px;
    }

    .swatch-info-option-preview {
      font-size: 0.74rem;
      opacity: 0.55;
      margin-left: 2px;
    }

    @media (max-width: 760px) {
      .swatch-name,
      .hex-field,
      .rgb-value {
        text-align: left;
      }
    }

    .color-editor {
      position: fixed;
      top: 96px;
      right: 24px;
      z-index: 4;
      width: min(440px, calc(100vw - 32px));
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .color-editor[hidden] {
      display: none;
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 8;
      display: flex;
      align-items: flex-start;
      justify-content: flex-end;
      padding: 96px 24px 24px;
      background: transparent;
      pointer-events: none;
    }

    .modal-overlay[hidden] {
      display: none;
    }

    .adjustments-dialog {
      width: min(440px, 100%);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
      color: var(--ink);
      background: var(--panel);
      box-shadow: var(--shadow);
      pointer-events: auto;
    }

    .adjustments-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .adjustments-top h2 {
      margin: 0;
      font-size: 1rem;
      line-height: 1.2;
    }

    .adjustment-fields {
      display: grid;
      gap: 12px;
    }

    .adjustment-field {
      display: grid;
      grid-template-columns: 92px 1fr 72px;
      gap: 10px;
      align-items: center;
    }

    .adjustment-field label {
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 700;
      text-transform: uppercase;
    }

    .adjustment-field input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
    }

    .adjustment-field input[type="number"] {
      width: 100%;
      min-height: 36px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 8px;
      color: var(--ink);
      background: var(--control);
      text-align: right;
    }

    .adjustment-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 16px;
    }

    .filter-options {
      display: grid;
      gap: 8px;
    }

    .filter-option {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 10px;
      background: var(--control-soft);
      cursor: pointer;
    }

    .filter-option input {
      width: 16px;
      height: 16px;
      margin: 0;
      accent-color: var(--accent);
    }

    .editor-top {
      display: grid;
      grid-template-columns: 44px 1fr auto;
      gap: 10px;
      align-items: center;
      margin-bottom: 12px;
    }

    .editor-preview {
      width: 44px;
      height: 44px;
      border: 1px solid rgba(21, 23, 28, 0.12);
      border-radius: 8px;
      background: var(--editor-color);
    }

    .editor-title {
      display: grid;
      gap: 4px;
      min-width: 0;
    }

    .editor-title strong,
    .editor-title span {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .editor-title span {
      color: var(--muted);
      font-size: 0.84rem;
    }

    .editor-mode {
      width: 100%;
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 10px;
      color: var(--ink);
      background: var(--control);
    }

    .editor-name-row {
      display: flex;
      gap: 6px;
      align-items: center;
      margin-bottom: 10px;
    }

    .editor-name {
      flex: 1;
      min-width: 0;
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 10px;
      color: var(--ink);
      background: var(--control);
      outline: none;
    }

    .editor-name:focus {
      border-color: rgba(18, 103, 216, 0.34);
      box-shadow: 0 0 0 3px rgba(18, 103, 216, 0.1);
    }

    .editor-picker {
      display: grid;
      gap: 10px;
    }

    .picker-plane {
      position: relative;
      width: 100%;
      aspect-ratio: 2.2;
      border: 1px solid var(--line);
      border-radius: 8px;
      background:
        linear-gradient(to top, #000, transparent),
        linear-gradient(to right, #fff, hsl(var(--picker-hue), 100%, 50%));
      cursor: pointer;
      overflow: hidden;
      touch-action: none;
    }

    .picker-target {
      position: absolute;
      left: var(--picker-x);
      top: var(--picker-y);
      width: 18px;
      height: 18px;
      border: 2px solid #fff;
      border-radius: 50%;
      box-shadow: 0 0 0 1px rgba(21, 23, 28, 0.55), 0 2px 10px rgba(21, 23, 28, 0.35);
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .picker-hue-row {
      display: grid;
      grid-template-columns: 52px 1fr;
      gap: 8px;
      align-items: center;
    }

    .picker-hue-row label {
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 700;
      text-transform: uppercase;
    }

    .picker-hue-row input[type="range"] {
      width: 100%;
      height: 10px;
      border-radius: 999px;
      background: linear-gradient(90deg, #ff0000, #ffff00, #00ff00, #00ffff, #0000ff, #ff00ff, #ff0000);
      cursor: pointer;
      appearance: none;
    }

    .picker-hue-row input[type="range"]::-webkit-slider-runnable-track {
      height: 10px;
      border-radius: 999px;
      background: linear-gradient(90deg, #ff0000, #ffff00, #00ff00, #00ffff, #0000ff, #ff00ff, #ff0000);
    }

    .picker-hue-row input[type="range"]::-webkit-slider-thumb {
      width: 20px;
      height: 20px;
      border: 2px solid #fff;
      border-radius: 50%;
      margin-top: -5px;
      background: hsl(var(--picker-hue), 100%, 50%);
      box-shadow: 0 2px 10px rgba(21, 23, 28, 0.28);
      appearance: none;
    }

    .picker-hue-row input[type="range"]::-moz-range-track {
      height: 10px;
      border-radius: 999px;
      background: linear-gradient(90deg, #ff0000, #ffff00, #00ff00, #00ffff, #0000ff, #ff00ff, #ff0000);
    }

    .picker-hue-row input[type="range"]::-moz-range-thumb {
      width: 18px;
      height: 18px;
      border: 2px solid #fff;
      border-radius: 50%;
      background: hsl(var(--picker-hue), 100%, 50%);
      box-shadow: 0 2px 10px rgba(21, 23, 28, 0.28);
    }

    .editor-fields {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }

    .editor-field {
      display: grid;
      grid-template-columns: 52px 1fr 78px;
      gap: 8px;
      align-items: center;
    }

    .editor-field label {
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 700;
      text-transform: uppercase;
    }

    .editor-field input[type="range"] {
      width: 100%;
      height: 10px;
      border-radius: 999px;
      background: var(--range-track, linear-gradient(90deg, #d7dde8, #1267d8));
      accent-color: var(--range-accent, var(--accent));
      cursor: pointer;
      appearance: none;
    }

    .editor-field input[type="range"]::-webkit-slider-runnable-track {
      height: 10px;
      border-radius: 999px;
      background: var(--range-track, linear-gradient(90deg, #d7dde8, #1267d8));
    }

    .editor-field input[type="range"]::-webkit-slider-thumb {
      width: 20px;
      height: 20px;
      border: 2px solid #fff;
      border-radius: 50%;
      margin-top: -5px;
      background: var(--range-accent, var(--accent));
      box-shadow: 0 2px 10px rgba(21, 23, 28, 0.28);
      appearance: none;
    }

    .editor-field input[type="range"]::-moz-range-track {
      height: 10px;
      border-radius: 999px;
      background: var(--range-track, linear-gradient(90deg, #d7dde8, #1267d8));
    }

    .editor-field input[type="range"]::-moz-range-thumb {
      width: 18px;
      height: 18px;
      border: 2px solid #fff;
      border-radius: 50%;
      background: var(--range-accent, var(--accent));
      box-shadow: 0 2px 10px rgba(21, 23, 28, 0.28);
    }

    .editor-field input[type="number"],
    .editor-hex {
      width: 100%;
      min-height: 36px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 9px;
      color: var(--ink);
      background: var(--control);
      outline: none;
    }

    .editor-hex {
      margin-top: 10px;
      text-transform: uppercase;
    }

    .saved-panel {
      padding: 16px;
    }

    .panel-header {
      display: flex;
      align-items: start;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 14px;
    }

    .panel-header h2 {
      margin: 0 0 4px;
      font-size: 1.05rem;
      letter-spacing: 0;
    }

    .panel-header p,
    .empty-state {
      margin: 0;
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.4;
    }

    .saved-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 12px;
      max-height: 640px;
      overflow: auto;
      padding-right: 3px;
    }

    .saved-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--control);
      overflow: hidden;
    }

    .saved-strip {
      display: grid;
      grid-template-columns: repeat(var(--saved-count), 1fr);
      height: 36px;
    }

    .saved-meta {
      display: grid;
      gap: 8px;
      padding: 10px;
    }

    .saved-top {
      display: grid;
      grid-template-columns: minmax(120px, 240px) max-content;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
    }

    .saved-name-field {
      width: 100%;
      border: 1px solid transparent;
      border-radius: 8px;
      margin: 0;
      padding: 7px 8px;
      color: var(--ink);
      background: var(--control-soft);
      font-size: 0.92rem;
      font-weight: 700;
      outline: none;
    }

    .saved-name-field:focus {
      border-color: rgba(18, 103, 216, 0.34);
      background: var(--control);
      box-shadow: 0 0 0 3px rgba(18, 103, 216, 0.1);
    }

    .saved-hexes {
      margin: 0;
      color: var(--muted);
      font-size: 0.82rem;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .saved-actions {
      display: flex;
      gap: 6px;
      justify-content: flex-end;
      align-items: center;
    }

    .saved-actions .button.icon {
      width: 32px;
      min-width: 32px;
      min-height: 32px;
      flex-shrink: 0;
    }

    .saved-actions .button {
      min-height: 32px;
      min-width: 64px;
      padding: 0 10px;
      font-size: 0.84rem;
    }

    .empty-state {
      border: 1px dashed #b9c2d1;
      border-radius: 8px;
      padding: 18px;
      background: rgba(var(--panel-rgb), 0.58);
    }

    .toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 9999;
      max-width: min(320px, calc(100vw - 36px));
      border: 1px solid rgba(21, 23, 28, 0.12);
      border-radius: 8px;
      padding: 12px 14px;
      color: #fff;
      background: rgba(21, 23, 28, 0.9);
      box-shadow: 0 12px 34px rgba(21, 23, 28, 0.2);
      opacity: 0;
      transform: translateY(10px);
      pointer-events: none;
      transition: opacity 160ms ease, transform 160ms ease;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    @media (max-width: 980px) {
      .workspace {
        grid-template-columns: 1fr;
      }

      .saved-list {
        grid-template-columns: 1fr;
        max-height: none;
      }
    }

    @media (max-width: 760px) {
      .app {
        width: min(100% - 20px, 620px);
        padding: 18px 0;
      }

      .topbar {
        grid-template-columns: 1fr;
      }

      .toolbar {
        justify-content: flex-start;
        flex-direction: column;
        gap: 8px;
      }

      /* Row 1: Generate + Add Color */
      .palette-generate-group {
        width: 100%;
        margin-right: 0;
        display: flex;
        gap: 8px;
      }

      .palette-generate-group .button.primary {
        flex: 1;
      }

      .palette-generate-group #addBtn {
        flex: 0 0 auto;
      }

      /* Row 2: all other controls in a wrapping flex row */
      .toolbar-secondary {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
        width: 100%;
      }

      .toolbar-secondary .button {
        flex: 0 0 auto;
      }

      .toolbar-secondary .tool-group-wrap {
        border-left: none;
        border-right: none;
        padding: 0;
      }

      .toolbar-secondary .theme-toggle-wrap {
        border-left: none;
        padding-left: 0;
        margin-left: auto;
      }

      .palette {
        grid-template-columns: 1fr;
        min-height: auto;
      }

      .swatch {
        min-height: 112px;
        flex-direction: row;
        align-items: center;
        padding: 14px 16px;
        gap: 0;
        justify-content: space-between;
      }

      .move-btn {
        display: flex;
        cursor: grab;
        touch-action: none;
      }

      .move-btn:active {
        cursor: grabbing;
        opacity: 1 !important;
      }

      .swatch-drag-zone {
        display: none;
      }

      .swatch-actions {
        position: static;
        top: auto;
        right: auto;
        left: auto;
        transform: none;
        flex-direction: row;
        flex-shrink: 0;
        gap: 0;
        background: none;
        align-self: center;
        order: 2;
        opacity: 1;
        pointer-events: auto;
      }

      /* On mobile, always show all buttons */
      .swatch.has-locked:not(:hover) .swatch-actions .button.icon:not(.lock-btn-locked) {
        opacity: 0.55;
        pointer-events: auto;
      }

      .swatch-actions .copy-hex-button {
        margin-left: 0;
      }

      .swatch .button.icon {
        width: 32px;
        min-width: 32px;
        min-height: 32px;
        border: none;
        background: transparent;
        backdrop-filter: none;
        box-shadow: none;
        opacity: 0.55;
      }

      .swatch .button.icon:hover,
      .swatch .button.icon:active {
        background: rgba(128,128,128,0.18);
        opacity: 1;
      }

      .color-info {
        flex: 1;
        min-width: 0;
        order: 1;
        padding-top: 0;
        padding-right: 8px;
      }

      .color-editor {
        top: auto;
        bottom: 0;
        right: 0;
        left: 0;
        width: 100%;
        border-radius: 12px 12px 0 0;
      }

      .modal-overlay {
        justify-content: center;
        padding: 88px 10px 18px;
      }

      .adjustments-dialog {
        width: min(360px, 100%);
      }

      /* Vertical split on mobile */
      .swatch-original-strip {
        top: 0;
        left: 0;
        right: auto;
        width: 50%;
        height: 100%;
      }

      .swatch-divider {
        top: 0;
        bottom: 0;
        left: 50%;
        right: auto;
        width: 1.5px;
        height: 100%;
      }

      .swatch:first-child .swatch-original-strip::after {
        bottom: auto;
        top: 50%;
        left: 4px;
        transform: translateY(-50%);
        writing-mode: vertical-rl;
      }

      .swatch-after-label {
        top: 50%;
        left: auto;
        right: 4px;
        transform: translateY(-50%);
        writing-mode: vertical-rl;
        margin-top: 0;
      }
    }

    @media (max-width: 480px) {
      .color-editor {
        width: calc(100vw - 20px);
      }
    }

    /* ── Color Info Modal ───────────────────────────────────────────────── */
    .color-info-overlay {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.38);
      padding: 20px;
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
      animation: ciOverlayIn 160ms ease forwards;
    }
    .color-info-overlay[hidden] { display: none; }

    @keyframes ciOverlayIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    .color-info-dialog {
      width: min(480px, 100%);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      box-shadow: var(--shadow);
      overflow: hidden;
      animation: ciDialogIn 180ms cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    @keyframes ciDialogIn {
      from { opacity: 0; transform: translateY(10px) scale(0.98); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .ci-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 16px 14px;
      border-bottom: 1px solid var(--line);
    }

    .ci-color-swatch {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      flex-shrink: 0;
      border: 1px solid rgba(0,0,0,0.08);
    }

    .ci-header-text {
      flex: 1;
      min-width: 0;
    }

    .ci-header-hex {
      font-size: 1rem;
      font-weight: 600;
      color: var(--ink);
      letter-spacing: 0.02em;
      font-family: monospace;
    }

    .ci-header-name {
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 1px;
    }

    .ci-close {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      padding: 6px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: color 120ms, background 120ms;
    }
    .ci-close:hover { color: var(--ink); background: var(--line); }
    .ci-close svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; }

    .ci-body {
      padding: 18px 16px;
      display: grid;
      gap: 22px;
    }

    .ci-section-title {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin: 0 0 12px;
    }

    /* Accessibility */
    .ci-contrast-rows {
      display: grid;
      gap: 10px;
    }

    .ci-contrast-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .ci-contrast-preview {
      width: 40px;
      height: 26px;
      border-radius: 5px;
      border: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.65rem;
      font-weight: 700;
      flex-shrink: 0;
      letter-spacing: 0.03em;
    }

    .ci-contrast-label {
      font-size: 0.8rem;
      color: var(--muted);
      width: 48px;
      flex-shrink: 0;
    }

    .ci-contrast-ratio {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--ink);
      width: 52px;
      flex-shrink: 0;
    }

    .ci-score-dots {
      display: flex;
      gap: 4px;
      align-items: center;
    }

    .ci-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--line);
      transition: background 120ms;
    }
    .ci-dot.filled { background: var(--accent); }

    .ci-wcag-badge {
      font-size: 0.65rem;
      font-weight: 700;
      padding: 2px 5px;
      border-radius: 4px;
      letter-spacing: 0.04em;
      margin-left: auto;
    }
    .ci-wcag-badge.pass-aaa { background: #d1fae5; color: #065f46; }
    .ci-wcag-badge.pass-aa  { background: #dbeafe; color: #1e40af; }
    .ci-wcag-badge.fail     { background: #fee2e2; color: #991b1b; }
    .dark-mode .ci-wcag-badge.pass-aaa { background: #064e3b; color: #6ee7b7; }
    .dark-mode .ci-wcag-badge.pass-aa  { background: #1e3a5f; color: #93c5fd; }
    .dark-mode .ci-wcag-badge.fail     { background: #7f1d1d; color: #fca5a5; }

    /* Harmonies */
    .ci-harmony-rows {
      display: grid;
      gap: 12px;
    }

    .ci-harmony-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .ci-harmony-name {
      font-size: 0.78rem;
      color: var(--muted);
      width: 120px;
      flex-shrink: 0;
    }

    .ci-harmony-swatches {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
    }

    .ci-swatch-chip {
      width: 26px;
      height: 26px;
      border-radius: 5px;
      border: 1px solid rgba(0,0,0,0.1);
      cursor: pointer;
      position: relative;
      flex-shrink: 0;
      transition: transform 100ms, box-shadow 100ms;
    }
    .ci-swatch-chip:hover {
      transform: scale(1.18);
      box-shadow: 0 2px 8px rgba(0,0,0,0.18);
      z-index: 2;
    }

    .ci-chip-tooltip {
      position: absolute;
      bottom: calc(100% + 5px);
      left: 50%;
      transform: translateX(-50%);
      background: var(--ink);
      color: var(--panel);
      font-size: 0.65rem;
      font-family: monospace;
      padding: 3px 6px;
      border-radius: 4px;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 100ms;
    }
    .ci-swatch-chip:hover .ci-chip-tooltip { opacity: 1; }

    @media (max-width: 600px) {
      .ci-harmony-name { width: 100px; font-size: 0.73rem; }
      .ci-swatch-chip  { width: 22px; height: 22px; }
    }

    /* ── Code export modal ────────────────────────────────────────────── */
    .code-export-overlay {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      background: rgba(21, 23, 28, 0.48);
      backdrop-filter: blur(3px);
    }

    .code-export-overlay[hidden] { display: none; }

    .code-export-dialog {
      display: flex;
      flex-direction: column;
      width: min(620px, 100%);
      max-height: min(680px, calc(100vh - 48px));
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--panel);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .code-export-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--line);
      flex-shrink: 0;
    }

    .code-export-title {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .code-export-title h2 {
      margin: 0;
      font-size: 0.95rem;
      line-height: 1.2;
    }

    .code-export-lang {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 5px;
      background: var(--control-soft);
      border: 1px solid var(--line);
      color: var(--muted);
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .code-export-body {
      flex: 1;
      overflow: auto;
      background: var(--control-soft);
    }

    .code-export-pre {
      margin: 0;
      padding: 18px 20px;
      font-family: ui-monospace, "Cascadia Code", "Fira Code", "Fira Mono", "Roboto Mono", Menlo, monospace;
      font-size: 0.82rem;
      line-height: 1.65;
      color: var(--ink);
      white-space: pre;
      overflow-x: auto;
      tab-size: 2;
    }

    .code-export-footer {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      padding: 12px 16px;
      border-top: 1px solid var(--line);
      flex-shrink: 0;
    }

    .code-export-footer .button svg {
      width: 15px;
      height: 15px;
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="topbar" aria-label="Palette Generator">

          [0.7, 0.3, 0],
          [0, 0.3, 0.7]
        ],

          [0, 0.433, 0.567],
          [0, 0.475, 0.525]

          [0.333, 0.667, 0],
          [0, 0.125, 0.875]

        tritanomaly: [
          [0.967, 0.033, 0],
          [0, 0.733, 0.267],
          [0, 0.183, 0.817]
        ]

      if (!matrix) return hex;
      const { r, g, b } = hexToRgb(hex);
      return rgbToHex({

        g: matrix[1][0] * r + matrix[1][1] * g + matrix[1][2] * b,

    function hsbText(hex) {
      const { h, s, b } = rgbToHsv(hexToRgb(hex));
      return `HSB ${h}, ${s}%, ${b}%`;

    function rgbToHsv({ r, g, b }) {
      r /= 255; g /= 255; b /= 255;
      const max = Math.max(r, g, b);
      const min = Math.min(r, g, b);
      const delta = max - min;
      let h = 0;
      if (delta) {
        if (max === r) h = ((g - b) / delta) % 6;
        if (max === g) h = (b - r) / delta + 2;
        if (max === b) h = (r - g) / delta + 4;
        h *= 60;
        if (h < 0) h += 360;

      return { h: Math.round(h), s: Math.round((max ? delta / max : 0) * 100), b: Math.round(max * 100) };

    function hsvToRgb({ h, s, b }) {
      h = ((clamp(h, 0, 360) % 360) + 360) % 360;
      s = clamp(s, 0, 100) / 100;
      b = clamp(b, 0, 100) / 100;
      const c = b * s;
      const x = c * (1 - Math.abs((h / 60) % 2 - 1));
      const m = b - c;
      let r = 0, g = 0, blue = 0;
      if (h < 60) [r, g, blue] = [c, x, 0];

      else if (h < 180) [r, g, blue] = [0, c, x];
      else if (h < 240) [r, g, blue] = [0, x, c];
      else if (h < 300) [r, g, blue] = [x, 0, c];
      else [r, g, blue] = [c, 0, x];
      return { r: (r + m) * 255, g: (g + m) * 255, b: (blue + m) * 255 };

    function rgbToHsl({ r, g, b }) {
      r /= 255; g /= 255; b /= 255;
      const max = Math.max(r, g, b);
      const min = Math.min(r, g, b);
      const delta = max - min;
      const l = (max + min) / 2;
      let h = 0;
      let s = 0;
      if (delta) {
        s = delta / (1 - Math.abs(2 * l - 1));
        if (max === r) h = ((g - b) / delta) % 6;
        if (max === g) h = (b - r) / delta + 2;

      return { h: Math.round(h), s: Math.round(s * 100), l: Math.round(l * 100) };

    function hslToRgb({ h, s, l }) {

      const m = l - c / 2;
      let r = 0, g = 0, b = 0;
      if (h < 60) [r, g, b] = [c, x, 0];
      else if (h < 120) [r, g, b] = [x, c, 0];
      else if (h < 180) [r, g, b] = [0, c, x];
      else if (h < 240) [r, g, b] = [0, x, c];
      else if (h < 300) [r, g, b] = [x, 0, c];
      else [r, g, b] = [c, 0, x];
      return { r: (r + m) * 255, g: (g + m) * 255, b: (b + m) * 255 };

      const hsl = rgbToHsl(hexToRgb(hex));

      // turn them red, which is wrong. Keep them achromatic by clamping saturation to 0.
      const isNeutral = hsl.s < 5;

        h: wrapHue(hsl.h + adjustments.hue),
        s: isNeutral ? 0 : clamp(vibranceSat + adjustments.saturation, 0, 100),
        l: clamp(hsl.l + adjustments.brightness, 0, 100)

      let rgb = {
        r: shiftedRgb.r + (temperature > 0 ? temperature * 0.8 : temperature * 0.25),
        g: shiftedRgb.g + (temperature > 0 ? temperature * 0.18 : Math.abs(temperature) * 0.12),

          g: clamp((rgb.g - 128) * factor + 128, 0, 255),

    function rgbToCmyk({ r, g, b }) {
      r /= 255; g /= 255; b /= 255;

      return {
        c: Math.round(((1 - r - k) / (1 - k)) * 100),
        m: Math.round(((1 - g - k) / (1 - k)) * 100),
        y: Math.round(((1 - b - k) / (1 - k)) * 100),
        k: Math.round(k * 100)

    }

    function cmykToRgb({ c, m, y, k }) {
      c = clamp(c, 0, 100) / 100;
      m = clamp(m, 0, 100) / 100;
      y = clamp(y, 0, 100) / 100;
      k = clamp(k, 0, 100) / 100;
      return {

        g: 255 * (1 - m) * (1 - k),
        b: 255 * (1 - y) * (1 - k)

      const f = (value) => Math.pow(value, 3) > 0.008856 ? Math.pow(value, 3) : (value - 16 / 116) / 7.787;

      y = 1.00000 * f(y);
      z = 1.08883 * f(z);
      let r = x * 3.2406 + y * -1.5372 + z * -0.4986;

      return { r: gamma(r) * 255, g: gamma(g) * 255, b: gamma(blue) * 255 };

        return 0.2126 * chan[0] + 0.7152 * chan[1] + 0.0722 * chan[2];
      }
      const l1 = lum(hex1), l2 = lum(hex2);
      const lighter = Math.max(l1, l2), darker = Math.min(l1, l2);
      return (lighter + 0.05) / (darker + 0.05);
    }

    function contrastScore(ratio) {
      // 1-5 scale: 1 = very poor, 5 = excellent
      if (ratio >= 7)    return 5;
      if (ratio >= 4.5)  return 4;
      if (ratio >= 3)    return 3;
      if (ratio >= 2)    return 2;
      return 1;
    }

    function wcagBadge(ratio) {
      const score = contrastScore(ratio);
      const cls = ratio >= 7 ? "pass-aaa" : ratio >= 4.5 ? "pass-aa" : "fail";
      return { text: `${score}/5`, cls };
    }

    function harmonyHexes(hex, type) {
      const hsl = rgbToHsl(hexToRgb(hex));
      const { h, s, l } = hsl;
      const mk = (hh, ss, ll) => hslToHex({ h: wrapHue(hh), s: clamp(ss, 5, 95), l: clamp(ll, 8, 92) });

      switch (type) {
        case "analogous":
          return [mk(h - 30, s, l), hex, mk(h + 30, s, l)];
        case "complementary":
          return [hex, mk(h + 180, s, l)];
        case "split-complementary":
          return [hex, mk(h + 150, s, l), mk(h + 210, s, l)];
        case "triadic":
          return [hex, mk(h + 120, s, l), mk(h + 240, s, l)];
        case "tetradic":
          return [hex, mk(h + 90, s, l), mk(h + 180, s, l), mk(h + 270, s, l)];
        case "square":
          return [hex, mk(h + 90, s, l), mk(h + 180, s, l), mk(h + 270, s, l)];
        default:
          return [hex];
      }
    }

      });

    function closeColorInfoModal() {
      const overlay = document.getElementById("colorInfoOverlay");
      overlay.hidden = true;
      if (overlay._escHandler) {
        document.removeEventListener("keydown", overlay._escHandler);
        overlay._escHandler = null;
      }
    }

    function syncEditorChrome() {
      if (editingIndex === null || !colors[editingIndex]) return;
      const color = colors[editingIndex];
      const hex = color.hex;
      const displayHex = previewHex(hex);
      editorEl.style.setProperty("--editor-color", hex);
      editorPreview.style.background = displayHex;
      editorHeading.textContent = colorDisplayName(color, editingIndex);
      editorHexLabel.textContent = `${hex} · ${rgbText(hex)}`;
      const hexInput = editorFields.querySelector(".editor-hex");
      if (hexInput) hexInput.value = hex;
      editorFields.querySelectorAll('input[type="range"]').forEach((range) => {
        range.style.setProperty("--range-accent", hex);
      });
    }

    function positionEditor(anchorEl) {
      const swatch = anchorEl || paletteEl.querySelector(`[data-color-index="${editingIndex}"]`);
      if (!swatch) return;

      const swatchRect = swatch.getBoundingClientRect();
      const editorRect = editorEl.getBoundingClientRect();
      const gap = 10;
      const viewportPadding = window.innerWidth <= 760 ? 10 : 16;
      const maxLeft = Math.max(viewportPadding, window.innerWidth - editorRect.width - viewportPadding);
      const maxTop = Math.max(viewportPadding, window.innerHeight - editorRect.height - viewportPadding);
      const centeredLeft = swatchRect.left + (swatchRect.width - editorRect.width) / 2;
      let top = swatchRect.top + (swatchRect.height - editorRect.height) / 2;

      if (editorRect.height + gap * 2 < swatchRect.height) {
        top = swatchRect.top + gap;
      }

      editorEl.style.setProperty("--editor-left", `${clamp(centeredLeft, viewportPadding, maxLeft)}px`);
      editorEl.style.setProperty("--editor-top", `${clamp(top, viewportPadding, maxTop)}px`);
    }

    let _editColorHistoryTimer = null;
    function setEditingColor(hex, refreshEditor = false) {
      if (editingIndex === null || !colors[editingIndex]) return;
      colors[editingIndex].hex = hex;
      if (!colors[editingIndex].nameLocked) {
        colors[editingIndex].name = closestCssName(hex);
        const nameInput = editorFields.querySelector(".editor-name");
        if (nameInput) nameInput.value = colors[editingIndex].name;
        const nameLockBtn = editorFields.querySelector(".name-lock-btn");
        if (nameLockBtn) syncNameLockBtn(nameLockBtn, false);
      }
      // Debounce history push so continuous slider drags produce one history entry
      clearTimeout(_editColorHistoryTimer);
      _editColorHistoryTimer = setTimeout(() => pushToHistory(colors), 400);
      renderPalette();
      if (refreshEditor) updateEditor();
      else {
        syncEditorChrome();
        positionEditor();
      }
    }

    function syncNameLockBtn(btn, locked) {
      btn.innerHTML = locked ? iconSvg("lock") : iconSvg("unlock");
      btn.title = locked ? "Name locked – click to auto-update" : "Name auto-updates with color";
      btn.setAttribute("aria-label", btn.title);
      btn.style.opacity = locked ? "1" : "0.45";
    }

    function setEditingName(name) {
      if (editingIndex === null || !colors[editingIndex]) return;
      colors[editingIndex].name = name.trim();
      colors[editingIndex].nameLocked = name.trim().length > 0;
      renderPalette();
      syncEditorChrome();
    }

    function fieldConfig(mode, hex) {
      const rgb = hexToRgb(hex);
      if (mode === "picker") return { values: rgbToHsv(rgb), fields: [["h", "H", 0, 360, 1], ["s", "S", 0, 100, 1], ["b", "B", 0, 100, 1]], toHex: (v) => rgbToHex(hsvToRgb(v)) };
      if (mode === "hsb") return { values: rgbToHsv(rgb), fields: [["h", "H", 0, 360, 1], ["s", "S", 0, 100, 1], ["b", "B", 0, 100, 1]], toHex: (v) => rgbToHex(hsvToRgb(v)) };
      if (mode === "hsl") return { values: rgbToHsl(rgb), fields: [["h", "H", 0, 360, 1], ["s", "S", 0, 100, 1], ["l", "L", 0, 100, 1]], toHex: (v) => rgbToHex(hslToRgb(v)) };
      if (mode === "rgb") return { values: rgb, fields: [["r", "R", 0, 255, 1], ["g", "G", 0, 255, 1], ["b", "B", 0, 255, 1]], toHex: (v) => rgbToHex(v) };
      if (mode === "cmyk") return { values: rgbToCmyk(rgb), fields: [["c", "C", 0, 100, 1], ["m", "M", 0, 100, 1], ["y", "Y", 0, 100, 1], ["k", "K", 0, 100, 1]], toHex: (v) => rgbToHex(cmykToRgb(v)) };
      if (mode === "lab") return { values: rgbToLab(rgb), fields: [["l", "L", 0, 100, 0.1], ["a", "A", -128, 127, 0.1], ["b", "B", -128, 127, 0.1]], toHex: (v) => rgbToHex(labToRgb(v)) };
      return { values: rgb, fields: [], toHex: (v) => rgbToHex(v) };
    }

    function sliderTrack(mode, key, values) {
      const rgb = hexToRgb(colors[editingIndex].hex);
      const fallbackHsv = rgbToHsv(rgb);
      const hue = values.h ?? fallbackHsv.h;
      const saturation = values.s ?? fallbackHsv.s;
      const lightness = values.l ?? 50;
      const brightness = values.b ?? fallbackHsv.b;
      const rainbow = "linear-gradient(90deg, #ff0000, #ffff00, #00ff00, #00ffff, #0000ff, #ff00ff, #ff0000)";
      const hsvHex = (nextValues) => rgbToHex(hsvToRgb({ h: hue, s: saturation, b: brightness, ...nextValues }));
      const hslHex = (nextValues) => rgbToHex(hslToRgb({ h: hue, s: saturation, l: lightness, ...nextValues }));
      const rgbHex = (nextValues) => rgbToHex({ ...rgb, ...values, ...nextValues });
      const cmykHex = (nextValues) => rgbToHex(cmykToRgb({ c: values.c ?? 0, m: values.m ?? 0, y: values.y ?? 0, k: values.k ?? 0, ...nextValues }));
      const labHex = (nextValues) => rgbToHex(labToRgb({ l: values.l ?? 50, a: values.a ?? 0, b: values.b ?? 0, ...nextValues }));
      const tracks = {
        picker: {
          h: rainbow,
          s: `linear-gradient(90deg, ${hsvHex({ s: 0, b: 100 })}, ${hsvHex({ s: 100, b: 100 })})`,
          b: `linear-gradient(90deg, ${hsvHex({ b: 0 })}, ${hsvHex({ b: 100 })})`
        },
        hsb: {
          h: rainbow,
          s: `linear-gradient(90deg, ${hsvHex({ s: 0, b: 100 })}, ${hsvHex({ s: 100, b: 100 })})`,
          b: `linear-gradient(90deg, ${hsvHex({ b: 0 })}, ${hsvHex({ b: 100 })})`
        },
        hsl: {
          h: rainbow,
          s: `linear-gradient(90deg, ${hslHex({ s: 0, l: 50 })}, ${hslHex({ s: 100, l: 50 })})`,
          l: `linear-gradient(90deg, ${hslHex({ l: 0 })}, ${hslHex({ l: 50 })}, ${hslHex({ l: 100 })})`
        },
        rgb: {
          r: `linear-gradient(90deg, ${rgbHex({ r: 0 })}, ${rgbHex({ r: 255 })})`,
          g: `linear-gradient(90deg, ${rgbHex({ g: 0 })}, ${rgbHex({ g: 255 })})`,
          b: `linear-gradient(90deg, ${rgbHex({ b: 0 })}, ${rgbHex({ b: 255 })})`
        },
        cmyk: {
          c: `linear-gradient(90deg, ${cmykHex({ c: 0 })}, ${cmykHex({ c: 100 })})`,
          m: `linear-gradient(90deg, ${cmykHex({ m: 0 })}, ${cmykHex({ m: 100 })})`,
          y: `linear-gradient(90deg, ${cmykHex({ y: 0 })}, ${cmykHex({ y: 100 })})`,
          k: `linear-gradient(90deg, ${cmykHex({ k: 0 })}, ${cmykHex({ k: 100 })})`
        },
        lab: {
          l: `linear-gradient(90deg, ${labHex({ l: 0 })}, ${labHex({ l: 50 })}, ${labHex({ l: 100 })})`,
          a: `linear-gradient(90deg, ${labHex({ a: -128 })}, ${labHex({ a: 0 })}, ${labHex({ a: 127 })})`,
          b: `linear-gradient(90deg, ${labHex({ b: -128 })}, ${labHex({ b: 0 })}, ${labHex({ b: 127 })})`
        }
      };
      return tracks[mode]?.[key] || "linear-gradient(90deg, #d7dde8, #1267d8)";
    }

    function syncSliderTracks(mode, values) {
      editorFields.querySelectorAll('input[type="range"]').forEach((range) => {
        range.style.setProperty("--range-track", sliderTrack(mode, range.dataset.key, values));
        range.style.setProperty("--range-accent", colors[editingIndex].hex);
      });
    }

    function syncPickerSurface(pickerEl, values) {
      pickerEl.style.setProperty("--picker-hue", values.h);
      pickerEl.style.setProperty("--picker-x", `${values.s}%`);
      pickerEl.style.setProperty("--picker-y", `${100 - values.b}%`);
    }

    function renderPickerEditor(config, editorValues) {
      const picker = document.createElement("div");
      picker.className = "editor-picker";
      syncPickerSurface(picker, editorValues);

      const plane = document.createElement("div");
      plane.className = "picker-plane";
      plane.setAttribute("role", "slider");
      plane.setAttribute("aria-label", "Saturation and brightness");
      plane.tabIndex = 0;

      const target = document.createElement("div");
      target.className = "picker-target";
      plane.append(target);

      const hueRow = document.createElement("div");
      hueRow.className = "picker-hue-row";

      const hueLabel = document.createElement("label");
      hueLabel.textContent = "H";

      const hueRange = document.createElement("input");
      hueRange.type = "range";
      hueRange.min = 0;
      hueRange.max = 360;
      hueRange.step = 1;
      hueRange.value = editorValues.h;
      hueRange.setAttribute("aria-label", "Hue");

      const applyPickerValue = () => {
        syncPickerSurface(picker, editorValues);
        setEditingColor(config.toHex(editorValues));
      };

      const updatePlaneValue = (event) => {
        const rect = plane.getBoundingClientRect();
        editorValues.s = Math.round(clamp(((event.clientX - rect.left) / rect.width) * 100, 0, 100));
        editorValues.b = Math.round(clamp(100 - ((event.clientY - rect.top) / rect.height) * 100, 0, 100));
        plane.setAttribute("aria-valuetext", `S ${editorValues.s}, B ${editorValues.b}`);
        applyPickerValue();
      };

      let draggingPlane = false;
      plane.addEventListener("pointerdown", (event) => {
        draggingPlane = true;
        plane.setPointerCapture(event.pointerId);
        updatePlaneValue(event);
      });
      plane.addEventListener("pointermove", (event) => {
        if (!draggingPlane) return;
        updatePlaneValue(event);
      });
      plane.addEventListener("pointerup", () => {
        draggingPlane = false;
      });
      plane.addEventListener("pointercancel", () => {
        draggingPlane = false;
      });

      hueRange.addEventListener("input", () => {
        editorValues.h = Number(hueRange.value);
        applyPickerValue();
      });

      hueRow.append(hueLabel, hueRange);
      picker.append(plane, hueRow);
      editorFields.append(picker);
    }

    function updateEditor(anchorEl) {
      if (editingIndex === null || !colors[editingIndex]) {
        editorEl.hidden = true;
        return;
      }

      const color = colors[editingIndex];
      const hex = color.hex;
      editorEl.hidden = false;
      syncEditorChrome();
      // editor is fixed top-right, no dynamic positioning needed
      editorCloseBtn.innerHTML = iconSvg("x");
      editorFields.innerHTML = "";

      const nameRow = document.createElement("div");
      nameRow.className = "editor-name-row";

      const nameInput = document.createElement("input");
      nameInput.className = "editor-name";
      nameInput.value = formatCssName(color.name || "");
      nameInput.placeholder = `Color ${editingIndex + 1}`;
      nameInput.setAttribute("aria-label", "Color name");
      nameInput.addEventListener("change", () => {
        setEditingName(nameInput.value);
        nameInput.value = formatCssName(colors[editingIndex]?.name || "");
        syncNameLockBtn(nameLockBtn, colors[editingIndex]?.nameLocked || false);
      });
      nameInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter") nameInput.blur();
      });

      const nameLockBtn = document.createElement("button");
      nameLockBtn.className = "button icon name-lock-btn";
      nameLockBtn.type = "button";
      syncNameLockBtn(nameLockBtn, color.nameLocked || false);
      nameLockBtn.addEventListener("click", () => {
        const locked = !colors[editingIndex].nameLocked;
        colors[editingIndex].nameLocked = locked;
        if (!locked) {
          colors[editingIndex].name = closestCssName(colors[editingIndex].hex);
          nameInput.value = colors[editingIndex].name;
          renderPalette();
        }
        syncNameLockBtn(nameLockBtn, locked);
      });

      nameRow.append(nameInput, nameLockBtn);
      editorFields.append(nameRow);

      const config = fieldConfig(editorMode.value, hex);
      const editorValues = { ...config.values };
      if (editorMode.value === "picker") {
        renderPickerEditor(config, editorValues);
      } else {
      config.fields.forEach(([key, label, min, max, step]) => {
        const row = document.createElement("div");
        row.className = "editor-field";

        const fieldLabel = document.createElement("label");
        fieldLabel.textContent = label;

        const range = document.createElement("input");
        range.type = "range";
        range.min = min;
        range.max = max;
        range.step = step;
        range.value = config.values[key];
        range.dataset.key = key;
        range.style.setProperty("--range-track", sliderTrack(editorMode.value, key, editorValues));
        range.style.setProperty("--range-accent", hex);

        const number = document.createElement("input");
        number.type = "number";
        number.min = min;
        number.max = max;
        number.step = step;
        number.value = config.values[key];
        number.setAttribute("aria-label", label);

        const applyValue = (value) => {
          const nextValues = { ...editorValues, [key]: clamp(value, min, max) };
          Object.assign(editorValues, nextValues);
          syncSliderTracks(editorMode.value, editorValues);
          setEditingColor(config.toHex(nextValues));
        };

        range.addEventListener("input", () => {
          number.value = range.value;
          applyValue(range.value);
        });
        number.addEventListener("change", () => {
          const nextValue = clamp(number.value, min, max);
          number.value = nextValue;
          range.value = nextValue;
          applyValue(nextValue);
        });
        row.append(fieldLabel, range, number);
        editorFields.append(row);
      });
      }

      const hexInput = document.createElement("input");
      hexInput.className = "editor-hex";
      hexInput.value = hex;
      hexInput.setAttribute("aria-label", "Hex color");
      hexInput.addEventListener("change", () => {
        const nextHex = normalizeHex(hexInput.value);
        if (!nextHex) {
          hexInput.value = hex;
          showToast("Use a valid hex color, like #47A8BD.");
          return;
        }
        setEditingColor(nextHex, true);
      });
      editorFields.append(hexInput);
    }

    function openEditor(index, anchorEl) {
      editingIndex = index;
      updateEditor(anchorEl);
    }

    function closeEditor() {
      editingIndex = null;
      editorEl.hidden = true;
    }

    function copyPaletteEntries(entries = colors) {
      return entries.map((color) => ({ ...color }));
    }

    function adjustmentValues() {
      return adjustmentRanges.reduce((values, input) => {
        values[input.dataset.adjustment] = Number(input.value);
        return values;
      }, { hue: 0, saturation: 0, brightness: 0, temperature: 0, contrast: 0, vibrance: 0 });
    }

    function resetAdjustmentControls() {
      adjustmentRanges.forEach((input) => {
        input.value = 0;
      });
      adjustmentNumbers.forEach((input) => {
        input.value = 0;
      });
    }

    function syncAdjustmentControl(key, value) {
      const range = adjustmentRanges.find((input) => input.dataset.adjustment === key);
      const number = adjustmentNumbers.find((input) => input.dataset.adjustmentNumber === key);
      if (!range || !number) return;
      const nextValue = clamp(value, range.min, range.max);
      range.value = nextValue;
      number.value = nextValue;
    }

    function previewAdjustments() {
      const values = adjustmentValues();
      colors = adjustmentBaseColors.map((color) => ({
        ...color,
        hex: adjustedPaletteHex(color.hex, values)
      }));
      renderPalette();
      if (editingIndex !== null) updateEditor();
    }

    function openAdjustments() {
      closeEditor();
      // If the filter modal is open, close it without restoring so its
      // current preview state becomes the baseline for adjustments.
      if (!filterModal.hidden) {
        filterModal.hidden = true;
        filterBeforeOpen = activeFilter;
        syncFilterControls();
      }
      adjustmentBaseColors = copyPaletteEntries();
      isAdjusting = true;
      resetAdjustmentControls();
      adjustmentModal.hidden = false;
      adjustCancelTopBtn.innerHTML = iconSvg("x");
      requestAnimationFrame(() => adjustmentRanges[0]?.focus());
    }

    function closeAdjustments({ restore = false } = {}) {
      if (restore && isAdjusting) {
        colors = copyPaletteEntries(adjustmentBaseColors);
      }
      adjustmentModal.hidden = true;
      adjustmentBaseColors = [];
      isAdjusting = false;
      renderPalette();
    }

    function applyAdjustments() {
      closeAdjustments();
      colors = colors.map((color) => ({ ...color, name: closestCssName(color.hex) }));
      pushToHistory(colors);
      renderPalette();
      showToast("Palette adjustments applied.");
    }

    function getPaletteColors() {
      return colors.map((color) => ({
        hex: color.hex,
        name: color.name || ""
      }));
    }

    function paletteColorEntries(palette) {
      return Array.isArray(palette.colors)
        ? palette.colors.map((color) => ({ hex: color.hex, name: color.name || "" }))
        : palette.hexes.map((hex) => ({ hex, name: "" }));
    }

    function paletteSignature(entries) {
      return entries.map((color) => `${color.hex}:${color.name || ""}`).join("|");
    }

    function loadSavedPalettes() {
      try {
        const parsed = JSON.parse(localStorage.getItem(storageKey) || "[]");
        savedPalettes = Array.isArray(parsed)
          ? parsed
            .filter((palette) => Array.isArray(palette.hexes))
            .map((palette, index) => ({
              id: palette.id || Date.now() + index,
              name: palette.name || `Palette ${index + 1}`,
              hexes: palette.hexes,
              colors: Array.isArray(palette.colors)
                ? palette.colors.filter((color) => normalizeHex(color.hex)).map((color) => ({
                  hex: normalizeHex(color.hex),
                  name: color.name || ""
                }))
                : palette.hexes.map((hex) => ({ hex, name: "" }))
            }))
          : [];
      } catch {
        savedPalettes = [];
      }
    }

    function persistSavedPalettes() {
      localStorage.setItem(storageKey, JSON.stringify(savedPalettes));
    }

    function updateControls() {
      addBtn.disabled = colors.length >= maxColors;
      paletteEl.style.setProperty("--count", colors.length);
    }


    function persistCurrentPalette() {
      // Don't persist during adjustment preview — only persist committed state
      if (isAdjusting) return;
      localStorage.setItem(currentPaletteKey, JSON.stringify(
        colors.map((c) => ({ hex: c.hex, name: c.name || "", locked: c.locked || false }))
      ));
    }

    function loadCurrentPalette() {
      try {
        const parsed = JSON.parse(localStorage.getItem(currentPaletteKey) || "null");
        if (!Array.isArray(parsed) || parsed.length < 2) return false;
        const loaded = parsed
          .map((c) => ({ hex: normalizeHex(c.hex), name: c.name || "", locked: !!c.locked }))
          .filter((c) => c.hex);
        if (loaded.length < 2) return false;
        colors = loaded;
        return true;
      } catch {
        return false;
      }
    }

    function makeUniqueHex(hsl, usedHexes) {
      let nextHsl = { ...hsl };
      let hex = hslToHex(nextHsl);
      let attempts = 0;
      while (usedHexes.has(hex) && attempts < 12) {
        attempts += 1;
        nextHsl = {
          ...nextHsl,
          h: wrapHue(nextHsl.h + 9 * attempts),
          l: clamp(nextHsl.l + (attempts % 2 ? 4 : -4), 18, 86)
        };
        hex = hslToHex(nextHsl);
      }
      usedHexes.add(hex);
      return hex;
    }

    // ─── Smart palette generator ───────────────────────────────────────────
    // Principles applied:
    //   • Dark anchor + light anchor for value contrast
    //   • Middle slots get gentle analogous hue drifts so the ramp has colour
    //   • One vivid accent on a split-complementary hue (120–210° away)
    //   • Warm/cool temperature bias shifts neutrals subtly each generation
    //   • Scales cleanly to any palette size
    function generateSmartCuratedHexes() {
      const warmBias = Math.random() > 0.5;

      // Base hue — biased toward perceptually rich ranges
      const hueRanges = [[0, 40], [170, 260], [265, 345]];
      const [hMin, hMax] = pickRandom(hueRanges);
      const baseHue = Math.round(randomBetween(hMin, hMax));

      // Accent on a split-complementary offset
      const accentOffset = pickRandom([120, 135, 150, 210, 225]);
      const accentHue = wrapHue(baseHue + accentOffset);

      // Temperature nudges
      const tempHueNudge = warmBias ? randomBetween(-10, 4) : randomBetween(-4, 10);
      const tempSatNudge = warmBias ? randomBetween(4, 14) : randomBetween(-10, 0);

      const neutralHue = wrapHue(baseHue + tempHueNudge);

      // Lightness poles
      const darkL  = Math.round(randomBetween(10, 22));
      const lightL = Math.round(randomBetween(80, 94));
      const accentL = Math.round(randomBetween(42, 60));

      // Saturation levels
      const neutralSat = clamp(Math.round(randomBetween(5, 16) + tempSatNudge), 0, 100);
      const accentSat  = Math.round(randomBetween(68, 92));

      const count = colors.length;
      const neutralCount = count - 1; // last slot = accent
      const slots = [];

      for (let i = 0; i < neutralCount; i++) {
        const t = neutralCount === 1 ? 0.5 : i / (neutralCount - 1);
        const l = Math.round(darkL + t * (lightL - darkL));

        const isMid = t > 0.15 && t < 0.85;
        let h, s;
        if (isMid) {
          // Drift the hue analogously as we move along the ramp,
          // alternating direction per slot for visual variety.
          const driftDir = (i % 2 === 0) ? 1 : -1;
          const driftAmount = randomBetween(18, 42) * driftDir;
          h = wrapHue(neutralHue + driftAmount);
          // Mid slots get moderate saturation so they read as coloured, not grey
          s = clamp(Math.round(randomBetween(28, 52) + tempSatNudge), 0, 100);
        } else {
          // Dark and light poles stay close to the base hue and low-sat
          h = wrapHue(neutralHue + randomBetween(-6, 6));
          s = neutralSat;
        }

        slots.push({ h, s, l });
      }

      // Vivid accent always last
      slots.push({ h: accentHue, s: accentSat, l: accentL });

      const usedHexes = new Set(colors.filter((c) => c.locked).map((c) => c.hex));

      return colors.map((color, index) => {
        if (color.locked) return color.hex;
        const slot = slots[Math.min(index, slots.length - 1)];
        const jittered = {
          h: wrapHue(slot.h + randomBetween(-5, 5)),
          s: clamp(slot.s + randomBetween(-4, 4), 0, 100),
          l: clamp(slot.l + randomBetween(-3, 3), 4, 96)
        };
        return makeUniqueHex(jittered, usedHexes);
      });
    }

    function generateSmartPaletteHexes() {
      return generateSmartCuratedHexes();
    }

    function nextRelatedColorHex() {
      if (!colors.length) return randomHex();
      const anchorColor = colors[colors.length - 1];
      const anchorHsl = rgbToHsl(hexToRgb(anchorColor.hex));
      const offset = pickRandom([-28, -16, 16, 28, 150, 180, 210]);
      return hslToHex({
        h: wrapHue(anchorHsl.h + offset + randomBetween(-4, 4)),
        s: Math.round(shiftedValue(anchorHsl.s || 58, 10, 34, 86)),
        l: Math.round(shiftedValue(anchorHsl.l || 52, 14, 22, 82))
      });
    }

    function moveColor(fromIndex, toIndex) {
      if (fromIndex === toIndex || fromIndex < 0 || toIndex < 0) return;
      const [movedColor] = colors.splice(fromIndex, 1);
      colors.splice(toIndex, 0, movedColor);
      if (editingIndex === fromIndex) editingIndex = toIndex;
      else if (editingIndex !== null && fromIndex < editingIndex && toIndex >= editingIndex) editingIndex -= 1;
      else if (editingIndex !== null && fromIndex > editingIndex && toIndex <= editingIndex) editingIndex += 1;
      renderPalette();
      if (editingIndex !== null) updateEditor();
    }

    function closestCssName(hex) {
      const { r, g, b } = hexToRgb(hex);
      const lab = rgbToLab({ r, g, b });
      let bestName = "Unknown";
      let bestDist = Infinity;
      for (const [name, nr, ng, nb] of CSS_NAMED_COLORS) {
        const nlab = rgbToLab({ r: nr, g: ng, b: nb });
        const dl = lab.l - nlab.l;
        const da = lab.a - nlab.a;
        const db = lab.b - nlab.b;
        const dist = dl * dl + da * da + db * db;
        if (dist < bestDist) { bestDist = dist; bestName = name; }
      }
      return bestName;
    }
