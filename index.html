    function renderPalette() {
      paletteEl.innerHTML = "";
      const showSplit = activeFilter !== "none" || isAdjusting;
      colors.forEach((color, index) => {
        const swatch = document.createElement("article");
        const displayHex = previewHex(color.hex);
        // Buttons sit over the top (original) strip, so base their contrast on the original color
        const buttonBaseHex = isAdjusting
          ? (adjustmentBaseColors[index]?.hex ?? color.hex)
          : color.hex;
        const labelColor = getContrastColor(buttonBaseHex);
        swatch.className = `swatch${isLight(buttonBaseHex) ? " dark-ui" : ""}${color.locked ? " has-locked" : ""}`;
        swatch.dataset.colorIndex = String(index);
        swatch.style.setProperty("--swatch-color", displayHex);
        swatch.style.setProperty("--label-color", labelColor);

        if (showSplit) {
          const originalHex = isAdjusting
            ? (adjustmentBaseColors[index]?.hex ?? color.hex)
            : color.hex;
          const originalLabel = getContrastColor(originalHex);
          const strip = document.createElement("div");
          strip.className = "swatch-original-strip";
          strip.style.setProperty("--original-color", originalHex);
          strip.style.setProperty("--original-label", originalLabel);
          swatch.append(strip);

          const divider = document.createElement("div");
          divider.className = "swatch-divider";
          swatch.append(divider);

          if (index === 0) {
            const afterLabel = document.createElement("div");
            afterLabel.className = "swatch-after-label";
            afterLabel.textContent = "after";
            swatch.append(afterLabel);
          }
        }

        swatch.addEventListener("click", (event) => {
          if (event.target.closest("button, input")) return;
          if (didDragColor) {
            didDragColor = false;
            return;
          }
          if (window.getSelection().toString().length > 0) return;
          openEditor(index, swatch);
        });

        const dragZone = document.createElement("div");
        dragZone.className = "swatch-drag-zone";

        swatch.addEventListener("dragover", (event) => {
          if (draggedColorIndex === null || draggedColorIndex === index) return;
          event.preventDefault();
          swatch.classList.add("drag-over");
          event.dataTransfer.dropEffect = "move";
        });

        swatch.addEventListener("dragleave", () => {
          swatch.classList.remove("drag-over");
        });

        swatch.addEventListener("drop", (event) => {
          event.preventDefault();
          swatch.classList.remove("drag-over");
          const fromIndex = draggedColorIndex ?? Number(event.dataTransfer.getData("text/plain"));
          draggedColorIndex = null;
          moveColor(fromIndex, index);
        });



        const actions = document.createElement("div");
        actions.className = "swatch-actions";

        const lockBtn = document.createElement("button");
        lockBtn.className = `button icon${color.locked ? " lock-btn-locked" : ""}`;
        lockBtn.type = "button";
        lockBtn.title = color.locked ? "Unlock color" : "Lock color";
        lockBtn.setAttribute("aria-label", lockBtn.title);
        lockBtn.innerHTML = color.locked ? iconSvg("lock") : iconSvg("unlock");
        lockBtn.addEventListener("click", () => {
          color.locked = !color.locked;
          renderPalette();
        });

        const copyBtn = document.createElement("button");
        copyBtn.className = "button icon copy-hex-button";
        copyBtn.type = "button";
        copyBtn.title = `Copy ${color.hex}`;
        copyBtn.setAttribute("aria-label", `Copy ${color.hex}`);
        copyBtn.innerHTML = iconSvg("clipboard");
        copyBtn.addEventListener("click", () => copyText(color.hex));

        const deleteBtn = document.createElement("button");
        deleteBtn.className = "button icon";
        deleteBtn.type = "button";
        deleteBtn.title = "Remove color";
        deleteBtn.setAttribute("aria-label", "Remove color");
        deleteBtn.innerHTML = iconSvg("x");
        deleteBtn.disabled = colors.length <= minColors;
        deleteBtn.addEventListener("click", () => {
          if (editingIndex === index) closeEditor();
          if (editingIndex !== null && editingIndex > index) editingIndex -= 1;
          colors.splice(index, 1);
          pushToHistory(colors);
          renderPalette();
        });

        // buttons appended below after moveBtn is set up

        const info = document.createElement("div");
        info.className = "color-info";

        const hexButton = document.createElement("button");
        hexButton.className = "hex-field";
        hexButton.type = "button";
        // During adjustment preview, show original values in text — only the color changes visually
        const textHex = isAdjusting ? (adjustmentBaseColors[index]?.hex ?? color.hex) : color.hex;
        const textName = isAdjusting ? (adjustmentBaseColors[index]?.name ?? color.name) : color.name;

        hexButton.textContent = textHex;
        hexButton.setAttribute("aria-label", `Open editor for ${textHex}`);
        hexButton.title = "Open color editor";
        hexButton.addEventListener("click", (e) => {
          e.stopPropagation();
          openEditor(index, swatch);
        });

        info.append(hexButton);

        const infoLines = swatchInfoLines(textHex, textName, index);
        const infoEl = document.createElement("button");
        infoEl.className = "swatch-name swatch-info-trigger";
        infoEl.type = "button";
        infoEl.title = "Change swatch display";
        infoEl.textContent = infoLines.join("\n") || "—";
        infoEl.addEventListener("click", (e) => {
          e.stopPropagation();
          openSwatchInfoModal(textHex, textName);
        });
        info.append(infoEl);

        // Move (grip) button — drag to reorder on desktop, touch-drag on mobile
        const moveBtn = document.createElement("button");
        moveBtn.className = "button icon move-btn";
        moveBtn.type = "button";
        moveBtn.title = "Drag to reorder";
        moveBtn.setAttribute("aria-label", "Drag to reorder");
        moveBtn.innerHTML = iconSvg("grip");
        moveBtn.draggable = true;
        moveBtn.addEventListener("dragstart", (event) => {
          draggedColorIndex = index;
          didDragColor = true;
          swatch.classList.add("dragging");
          event.dataTransfer.effectAllowed = "move";
          event.dataTransfer.setData("text/plain", String(index));
          const preview = createDragPreview(color, index);
          event.dataTransfer.setDragImage(preview, 61, 34);
          requestAnimationFrame(() => preview.remove());
        });
        moveBtn.addEventListener("dragend", () => {
          draggedColorIndex = null;
          swatch.classList.remove("dragging", "drag-over");
          setTimeout(() => { didDragColor = false; }, 0);
        });
        // moveBtn already added in actions.append above

        let touchDragActive = false;
        let touchGhost = null;
        let activeDragIndex = index;

        moveBtn.addEventListener("touchstart", (e) => {
          e.preventDefault();
          activeDragIndex = index;
          touchDragActive = true;
          moveBtn.style.opacity = "1";
        }, { passive: false });

        moveBtn.addEventListener("touchmove", (e) => {
          if (!touchDragActive) return;
          e.preventDefault();
          const t = e.touches[0];

          if (!touchGhost) {
            touchGhost = swatch.cloneNode(true);
            touchGhost.style.cssText = `position:fixed;left:0;top:0;width:${swatch.offsetWidth}px;height:${swatch.offsetHeight}px;opacity:0.8;pointer-events:none;z-index:9999;border-radius:4px;overflow:hidden;box-shadow:0 8px 24px rgba(0,0,0,0.22);`;
            document.body.append(touchGhost);
            swatch.style.opacity = "0.35";
          }
          const rect = paletteEl.getBoundingClientRect();
          touchGhost.style.transform = `translate(${rect.left}px, ${t.clientY - swatch.offsetHeight / 2}px)`;

          const el = document.elementFromPoint(t.clientX, t.clientY);
          const target = el?.closest(".swatch");
          if (target && target !== swatch) {
            const toIdx = Number(target.dataset.colorIndex);
            if (!isNaN(toIdx) && toIdx !== activeDragIndex) {
              moveColor(activeDragIndex, toIdx);
              activeDragIndex = toIdx;
            }
          }
        }, { passive: false });

        const endMoveTouch = () => {
          if (!touchDragActive) return;
          touchDragActive = false;
          if (touchGhost) { touchGhost.remove(); touchGhost = null; }
          swatch.style.opacity = "";
          moveBtn.style.opacity = "";
        };
        moveBtn.addEventListener("touchend", endMoveTouch, { passive: true });
        moveBtn.addEventListener("touchcancel", endMoveTouch, { passive: true });

        const infoBtn = document.createElement("button");
        infoBtn.className = "button icon";
        infoBtn.type = "button";
        infoBtn.title = "Color info";
        infoBtn.setAttribute("aria-label", "Color info");
        infoBtn.innerHTML = iconSvg("info");
        infoBtn.addEventListener("click", (e) => {
          e.stopPropagation();
          openColorInfoModal(color.hex, color.name);
        });

        actions.append(lockBtn, moveBtn, copyBtn, infoBtn, deleteBtn);

        swatch.append(actions, dragZone, info);

        // After render, set --info-height so buttons sit just above the info block
        requestAnimationFrame(() => {
          const infoH = info.getBoundingClientRect().height;
          swatch.style.setProperty("--info-height", `${infoH}px`);
        });
        paletteEl.append(swatch);
      });
      updateControls();
      persistCurrentPalette();
    }

    function pushToHistory(snapshot) {
      // Truncate forward history if we're not at the end
      generationHistory = generationHistory.slice(0, historyIndex + 1);
      generationHistory.push(snapshot.map(c => ({ ...c })));
      if (generationHistory.length > MAX_HISTORY) generationHistory.shift();
      historyIndex = generationHistory.length - 1;
      updateUndoRedoBtns();
    }

    function updateUndoRedoBtns() {
      const undoBtn = document.getElementById("undoBtn");
      const redoBtn = document.getElementById("redoBtn");
      if (undoBtn) undoBtn.disabled = historyIndex <= 0;
      if (redoBtn) redoBtn.disabled = historyIndex >= generationHistory.length - 1;
    }

    function undoGeneration() {
      if (historyIndex <= 0) return;
      historyIndex -= 1;
      colors = generationHistory[historyIndex].map(c => ({ ...c }));
      renderPalette();
      if (editingIndex !== null) updateEditor();
      updateUndoRedoBtns();
      showToast("Undone.");
    }

    function redoGeneration() {
      if (historyIndex >= generationHistory.length - 1) return;
      historyIndex += 1;
      colors = generationHistory[historyIndex].map(c => ({ ...c }));
      renderPalette();
      if (editingIndex !== null) updateEditor();
      updateUndoRedoBtns();
      showToast("Redone.");
    }

    function generatePalette() {
      if (isAdjusting) closeAdjustments();
      const nextHexes = generateSmartPaletteHexes();
      colors = colors.map((color, index) => color.locked ? color : { ...color, hex: nextHexes[index], name: closestCssName(nextHexes[index]) });
      pushToHistory(colors);
      renderPalette();
      if (editingIndex !== null) updateEditor();
    }

    function addColor() {
      if (isAdjusting) closeAdjustments();
      if (colors.length >= maxColors) return;
      const hex = nextRelatedColorHex();
      // On desktop (≥760px) append to end; on mobile prepend to start
      if (window.innerWidth >= 760) {
        colors.push({ hex, name: closestCssName(hex), locked: false });
      } else {
        colors.unshift({ hex, name: closestCssName(hex), locked: false });
      }
      pushToHistory(colors);
      renderPalette();
    }

    function sharePalette() {
      const hexes = colors.map((c) => c.hex.replace("#", "")).join("-");
      const hash = `#palette=${hexes}`;
      const url = window.location.href.split("#")[0] + hash;
      if (navigator.clipboard && window.isSecureContext) {
        navigator.clipboard.writeText(url).then(() => showToast("Share link copied!")).catch(() => {
          fallbackCopyText(url);
        });
      } else {
        fallbackCopyText(url);
      }
    }

    function fallbackCopyText(text) {
      const el = document.createElement("textarea");
      el.value = text;
      el.style.position = "fixed";
      el.style.opacity = "0";
      document.body.append(el);
      el.focus();
      el.select();
      document.execCommand("copy");
      el.remove();
      showToast("Share link copied!");
    }

    function loadPaletteFromUrl() {
      try {
        const hash = window.location.hash;
        if (!hash || !hash.includes("palette=")) return false;
        const params = new URLSearchParams(hash.slice(1));
        const paletteParam = params.get("palette");
        if (!paletteParam) return false;
        const hexes = paletteParam.split("-").map((h) => normalizeHex(`#${h}`)).filter(Boolean);
        if (hexes.length < 2) return false;
        colors = hexes.map((hex) => ({ hex, name: closestCssName(hex), locked: false }));
        return true;
      } catch {
        return false;
      }
    }

    function autoNamePalette(paletteColors) {
      // Score by visual dominance: saturation weighted by mid-tone proximity
      // Vivid mid-tones rank highest; near-black/white extremes rank lowest
      const scored = paletteColors.map((color) => {
        const { s, l } = rgbToHsl(hexToRgb(color.hex));
        const score = (s / 100) * (1 - Math.abs((l / 100) - 0.5) * 2);
        return { color, score };
      });
      scored.sort((a, b) => b.score - a.score);
      const first = scored[0].color.name || closestCssName(scored[0].color.hex);
      const second = scored[1]?.color.name || closestCssName(scored[1]?.color.hex);
      return `${first} ${second}`;
    }

    function savePalette() {
      const paletteColors = getPaletteColors();
      const hexes = paletteColors.map((color) => color.hex);
      const duplicate = savedPalettes.some((palette) => paletteSignature(paletteColorEntries(palette)) === paletteSignature(paletteColors));
      if (duplicate) {
        showToast("That palette is already saved.");
        return;
      }

      const id = Date.now();
      savedPalettes.unshift({
        id,
        name: autoNamePalette(paletteColors),
        hexes,
        colors: paletteColors
      });
      persistSavedPalettes();
      renderSavedPalettes();
      const nameField = savedListEl.querySelector(`[data-palette-id="${id}"]`);
      if (nameField) {
        nameField.focus();
        nameField.select();
      }
      showToast("Palette saved.");
    }

    function loadSvgImage(svgElement) {
      return new Promise((resolve, reject) => {
        const clone = svgElement.cloneNode(true);
        clone.removeAttribute("class");
        clone.setAttribute("width", "438");
        clone.setAttribute("height", "45");
        const svgText = new XMLSerializer().serializeToString(clone);
        const image = new Image();
        image.onload = () => resolve(image);
        image.onerror = reject;
        image.src = `data:image/svg+xml;charset=utf-8,${encodeURIComponent(svgText)}`;
      });
    }

    async function exportImage() {
      // Ensure Inter is loaded before drawing
      await document.fonts.load("700 28px Inter");
      await document.fonts.load("500 28px Inter");

      const width = 2400;
      const colorHeight = 900;
      const footerHeight = 130;
      const height = colorHeight + footerHeight;
      const canvas = document.createElement("canvas");
      const ctx = canvas.getContext("2d");
      canvas.width = width;
      canvas.height = height;

      const swatchWidth = width / colors.length;
      colors.forEach((color, index) => {
        const x = index * swatchWidth;
        ctx.fillStyle = color.hex;
        ctx.fillRect(x, 0, Math.ceil(swatchWidth), colorHeight);

        ctx.fillStyle = getContrastColor(color.hex);
        const fontSize = colors.length > 8 ? 18 : colors.length > 6 ? 22 : 28;
        const lineHeight = fontSize * 1.35;
        const infoLines = swatchInfoLines(color.hex, color.name, index);
        const nameOnly = swatchInfoModes.length === 1 && swatchInfoModes[0] === "name";
        const labelLines = [
          colorDisplayName(color, index),
          color.hex,
          ...(!nameOnly ? infoLines : [])
        ];
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.shadowColor = getContrastColor(color.hex) === "#FFFFFF" ? "rgba(0, 0, 0, 0.28)" : "rgba(255, 255, 255, 0.24)";
        ctx.shadowBlur = 10;
        const bottomPadding = 58;
        const startY = colorHeight - bottomPadding - ((labelLines.length - 1) * lineHeight);
        const baseColor = getContrastColor(color.hex);
        labelLines.forEach((line, lineIndex) => {
          // name = full, hex = 0.72, extra info lines = 0.48
          const alpha = lineIndex === 0 ? 1 : lineIndex === 1 ? 0.72 : 0.48;
          const rgb = baseColor === "#FFFFFF" ? "255,255,255" : "21,23,28";
          ctx.fillStyle = `rgba(${rgb},${alpha})`;
          ctx.font = `${lineIndex === 0 ? 700 : 500} ${fontSize}px Inter, ui-sans-serif, sans-serif`;
          ctx.fillText(line, x + swatchWidth / 2, startY + lineIndex * lineHeight, Math.max(96, swatchWidth - 18));
        });
        ctx.shadowBlur = 0;
      });

      ctx.fillStyle = "#ffffff";
      ctx.fillRect(0, colorHeight, width, footerHeight);
      try {
        const logo = await loadSvgImage(document.querySelector(".brand-logo-light"));
        const logoMaxWidth = 360;
        const logoMaxHeight = 54;
        const logoAspect = 438 / 45;
        let logoWidth = logoMaxWidth;
        let logoHeight = logoWidth / logoAspect;
        if (logoHeight > logoMaxHeight) {
          logoHeight = logoMaxHeight;
          logoWidth = logoHeight * logoAspect;
        }
        ctx.drawImage(logo, (width - logoWidth) / 2, colorHeight + (footerHeight - logoHeight) / 2, logoWidth, logoHeight);
      } catch {
        ctx.fillStyle = "#15171c";
        ctx.font = "700 34px Inter, ui-sans-serif, sans-serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText("PallleteGen", width / 2, colorHeight + footerHeight / 2);
      }

      // Filename: PallleteGen-[palette name].png
      const paletteName = autoNamePalette(getPaletteColors());
      const safeFileName = `PallleteGen-${paletteName.replace(/[^a-zA-Z0-9 _-]/g, "").trim().replace(/\s+/g, "-")}`;
      const link = document.createElement("a");
      link.download = `${safeFileName}.png`;
      link.href = canvas.toDataURL("image/png");
      link.click();
      showToast("Palette exported as PNG.");
    }

    function exportSvg() {
      const swatchW = 200;
      const swatchH = 400;
      const total = colors.length;
      const width = swatchW * total;
      const defs = colors.map((_, i) => `<clipPath id="clip${i}"><rect x="${i * swatchW}" y="0" width="${swatchW}" height="${swatchH}"/></clipPath>`).join("\n");
      const svgParts = colors.map((color, i) => {
        const x = i * swatchW;
        const labelColor = getContrastColor(color.hex) === "#FFFFFF" ? "#ffffff" : "#15171c";
        const infoLines = swatchInfoLines(color.hex, color.name, i);
        const nameOnly = swatchInfoModes.length === 1 && swatchInfoModes[0] === "name";
        const lines = [
          color.hex,
          ...(!nameOnly ? infoLines : [])
        ];
        // Lay lines out bottom-up from a bottom anchor, clamped to the swatch
        const lineH = 22;
        const bottomAnchor = swatchH - 18;
        const totalTextH = lines.length * lineH;
        const startY = Math.max(lineH, bottomAnchor - totalTextH + lineH);
        const textEls = lines.map((line, li) => {
          // hex line = 0.72, extra info lines = 0.48
          const opacity = li === 0 ? 0.72 : 0.48;
          const y = startY + li * lineH;
          return `<text x="${x + swatchW / 2}" y="${y}" text-anchor="middle" font-family="Inter,ui-sans-serif,sans-serif" font-size="${li === 0 ? 15 : 12}" font-weight="${li === 0 ? 700 : 400}" fill="${labelColor}" opacity="${opacity}">${line}</text>`;
        }).join("\n");
        return `<rect x="${x}" y="0" width="${swatchW}" height="${swatchH}" fill="${color.hex}"/>\n<g clip-path="url(#clip${i})">\n${textEls}\n</g>`;
      }).join("\n");
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${width}" height="${swatchH}" viewBox="0 0 ${width} ${swatchH}">\n<defs>\n${defs}\n</defs>\n${svgParts}\n</svg>`;
      const blob = new Blob([svg], { type: "image/svg+xml" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      const paletteName = autoNamePalette(getPaletteColors());
      a.download = `PallleteGen-${paletteName.replace(/[^a-zA-Z0-9 _-]/g, "").trim().replace(/\s+/g, "-")}.svg`;
      a.href = url;
      a.click();
      URL.revokeObjectURL(url);
      showToast("Palette exported as SVG.");
    }

    function exportCssVars() {
      const lines = [":root {"];
      colors.forEach((color, i) => {
        const slug = (color.name || `color-${i + 1}`).toLowerCase().replace(/\s+/g, "-").replace(/[^a-z0-9-]/g, "");
        lines.push(`  --color-${slug}: ${color.hex};`);
      });
      lines.push("}");
      openCodeExportModal({ label: "CSS", lang: ".css", code: lines.join("\n") });
    }

    function exportTailwind() {
      const entries = colors.map((color, i) => {
        const slug = (color.name || `color-${i + 1}`).toLowerCase().replace(/\s+/g, "-").replace(/[^a-z0-9-]/g, "");
        return `        '${slug}': '${color.hex}',`;
      }).join("\n");
      const text = `/** @type {import('tailwindcss').Config} */\nmodule.exports = {\n  theme: {\n    extend: {\n      colors: {\n${entries}\n      },\n    },\n  },\n};`;
      openCodeExportModal({ label: "Tailwind", lang: ".js", code: text });
    }

    function exportScss() {
      const lines = colors.map((color, i) => {
        const slug = (color.name || `color-${i + 1}`).toLowerCase().replace(/\s+/g, "-").replace(/[^a-z0-9-]/g, "");
        return `$color-${slug}: ${color.hex};`;
      });
      openCodeExportModal({ label: "SCSS", lang: ".scss", code: lines.join("\n") });
    }

    function exportJson() {
      const obj = colors.map((color, i) => {
        const { r, g, b } = hexToRgb(color.hex);
        const { h, s, l } = rgbToHsl({ r, g, b });
        return {
          index: i + 1,
          name: color.name || null,
          hex: color.hex,
          rgb: { r, g, b },
          hsl: { h: Math.round(h), s: Math.round(s), l: Math.round(l) }
        };
      });
      openCodeExportModal({ label: "JSON", lang: ".json", code: JSON.stringify(obj, null, 2) });
    }

    function initSwatchInfoModal() {
      const overlay  = document.getElementById("swatchInfoOverlay");
      const closeBtn = document.getElementById("swatchInfoCloseBtn");
      const optionsEl = document.getElementById("swatchInfoOptions");
      closeBtn.innerHTML = iconSvg("x");

      SWATCH_INFO_OPTIONS.forEach(({ value, label, preview }) => {
        const btn = document.createElement("button");
        const isActive = swatchInfoModes.includes(value);
        btn.className = `swatch-info-option${isActive ? " active" : ""}`;
        btn.type = "button";
        btn.dataset.value = value;
        btn.innerHTML = `
          <span>${label}</span>
          <span class="swatch-info-option-preview">${preview}</span>
        `;

        // Checkmark (stays inside the toggle button)
        const checkSvg = document.createElement("span");
        checkSvg.innerHTML = `<svg class="swatch-info-option-check" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="2.5,8.5 6,12 13.5,4"/></svg>`;
        btn.append(checkSvg.firstElementChild);

        btn.addEventListener("click", () => {
          const idx = swatchInfoModes.indexOf(value);
          if (idx === -1) {
            swatchInfoModes.push(value);
          } else {
            // Don't allow deselecting if it's the only one
            if (swatchInfoModes.length > 1) {
              swatchInfoModes.splice(idx, 1);
            }
          }
          localStorage.setItem(swatchInfoKey, JSON.stringify(swatchInfoModes));
          // Update all button active states
          optionsEl.querySelectorAll(".swatch-info-option").forEach(b => {
            b.classList.toggle("active", swatchInfoModes.includes(b.dataset.value));
          });
          renderPalette();
          // Don't close — allow multi-select
        });

        // Copy button — outside the toggle, in its own row wrapper
        const copyBtn = document.createElement("button");
        copyBtn.className = "button icon swatch-info-copy-btn";
        copyBtn.type = "button";
        copyBtn.title = "Copy value";
        copyBtn.setAttribute("aria-label", "Copy value");
        copyBtn.dataset.copyValue = preview;
        copyBtn.innerHTML = iconSvg("clipboard");
        copyBtn.addEventListener("click", (e) => {
          e.stopPropagation();
          const val = copyBtn.dataset.copyValue;
          if (val) copyText(val);
        });

        const row = document.createElement("div");
        row.className = "swatch-info-option-row";
        row.append(btn, copyBtn);
        optionsEl.append(row);
      });

      closeBtn.addEventListener("click", closeSwatchInfoModal);
      overlay.addEventListener("click", (e) => { if (e.target === overlay) closeSwatchInfoModal(); });
      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape" && !overlay.hidden) closeSwatchInfoModal();
      });
    }

    let _swatchInfoContext = { hex: "#0047ab", name: "Cobalt Blue" };

    function openSwatchInfoModal(hex, name) {
      if (hex) _swatchInfoContext = { hex, name: name || "" };
      // Sync active state and live previews
      document.querySelectorAll(".swatch-info-option").forEach(b => {
        b.classList.toggle("active", swatchInfoModes.includes(b.dataset.value));
        const liveText = swatchInfoTextForMode(b.dataset.value, _swatchInfoContext.hex, _swatchInfoContext.name, 0) || "";
        const previewEl = b.querySelector(".swatch-info-option-preview");
        if (previewEl) {
          previewEl.textContent = liveText;
        }
        // Copy button is now a sibling of the toggle button, inside the row wrapper
        const copyBtn = b.parentElement && b.parentElement.querySelector(".swatch-info-copy-btn");
        if (copyBtn) {
          copyBtn.dataset.copyValue = liveText;
        }
      });
      document.getElementById("swatchInfoOverlay").hidden = false;
    }

    function closeSwatchInfoModal() {
      document.getElementById("swatchInfoOverlay").hidden = true;
    }
    let _codeExportState = null;

    function openCodeExportModal({ label, lang, code }) {
      _codeExportState = { label, lang, code };
      const overlay  = document.getElementById("codeExportOverlay");
      const pre      = document.getElementById("codeExportPre");
      const langEl   = document.getElementById("codeExportLang");
      const titleEl  = document.getElementById("codeExportTitle");
      const copyBtn  = document.getElementById("codeExportCopyBtn");
      const dlBtn    = document.getElementById("codeExportDownloadBtn");
      const closeBtn = document.getElementById("codeExportCloseBtn");

      titleEl.textContent = `Export ${label}`;
      langEl.textContent  = lang;
      pre.textContent     = code;

      // Download button label + icon
      dlBtn.innerHTML = `${iconSvg("download")} Download${lang}`;
      copyBtn.innerHTML = `${iconSvg("clipboard")} Copy`;

      overlay.hidden = false;
      copyBtn.focus();
    }

    function closeCodeExportModal() {
      document.getElementById("codeExportOverlay").hidden = true;
      _codeExportState = null;
    }

    function initCodeExportModal() {
      const overlay  = document.getElementById("codeExportOverlay");
      const copyBtn  = document.getElementById("codeExportCopyBtn");
      const dlBtn    = document.getElementById("codeExportDownloadBtn");
      const closeBtn = document.getElementById("codeExportCloseBtn");

      closeBtn.innerHTML = iconSvg("x");

      closeBtn.addEventListener("click", closeCodeExportModal);
      overlay.addEventListener("click", (e) => { if (e.target === overlay) closeCodeExportModal(); });
      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape" && !overlay.hidden) closeCodeExportModal();
      });

      copyBtn.addEventListener("click", () => {
        if (!_codeExportState) return;
        if (navigator.clipboard && window.isSecureContext) {
          navigator.clipboard.writeText(_codeExportState.code)
            .then(() => showToast(`${_codeExportState.label} copied!`))
            .catch(() => fallbackCopy(_codeExportState.code));
        } else {
          fallbackCopy(_codeExportState.code);
        }
      });

      dlBtn.addEventListener("click", () => {
        if (!_codeExportState) return;
        const { lang, code, label } = _codeExportState;
        const mimeMap = { ".css": "text/css", ".js": "text/javascript", ".scss": "text/x-scss", ".json": "application/json" };
        const mime = mimeMap[lang] || "text/plain";
        const paletteName = autoNamePalette(getPaletteColors());
        const safeBase = `PallleteGen-${paletteName.replace(/[^a-zA-Z0-9 _-]/g, "").trim().replace(/\s+/g, "-")}`;
        const blob = new Blob([code], { type: mime });
        const url  = URL.createObjectURL(blob);
        const a    = document.createElement("a");
        a.download = `${safeBase}${lang}`;
        a.href = url;
        a.click();
        URL.revokeObjectURL(url);
        showToast(`${label} downloaded!`);
      });
    }

    function exportHexList() {
      copyText(colors.map(c => c.hex).join("\n"));
      showToast("HEX codes copied!");
    }

    generateBtn.addEventListener("click", generatePalette);
    document.getElementById("undoBtn").addEventListener("click", undoGeneration);
    document.getElementById("redoBtn").addEventListener("click", redoGeneration);
    addBtn.addEventListener("click", addColor);
    filtersBtn.addEventListener("click", openFilters);
    adjustBtn.addEventListener("click", openAdjustments);
    saveBtn.addEventListener("click", savePalette);
    const exportDropdown = document.getElementById("exportDropdown");
    exportBtn.addEventListener("click", (e) => {
      e.stopPropagation();
      const open = !exportDropdown.hidden;
      exportDropdown.hidden = open;
      exportBtn.setAttribute("aria-expanded", String(!open));
    });
    document.addEventListener("click", (e) => {
      if (!document.getElementById("exportWrap").contains(e.target)) {
        exportDropdown.hidden = true;
        exportBtn.setAttribute("aria-expanded", "false");
      }
    });
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && !exportDropdown.hidden) {
        exportDropdown.hidden = true;
        exportBtn.setAttribute("aria-expanded", "false");
      }
    });
    function closeExportDropdown() {
      exportDropdown.hidden = true;
      exportBtn.setAttribute("aria-expanded", "false");
    }
    document.getElementById("exportPng").addEventListener("click", () => { closeExportDropdown(); exportImage(); });
    document.getElementById("exportSvg").addEventListener("click", () => { closeExportDropdown(); exportSvg(); });
    document.getElementById("exportUrl").addEventListener("click", () => { closeExportDropdown(); sharePalette(); });
    document.getElementById("exportCss").addEventListener("click", () => { closeExportDropdown(); exportCssVars(); });
    document.getElementById("exportTailwind").addEventListener("click", () => { closeExportDropdown(); exportTailwind(); });
    document.getElementById("exportScss").addEventListener("click", () => { closeExportDropdown(); exportScss(); });
    document.getElementById("exportJson").addEventListener("click", () => { closeExportDropdown(); exportJson(); });
    document.getElementById("exportHexList").addEventListener("click", () => { closeExportDropdown(); exportHexList(); });
    themeBtn.addEventListener("click", toggleTheme);
    adjustCancelTopBtn.addEventListener("click", () => closeAdjustments({ restore: true }));
    adjustCancelBtn.addEventListener("click", () => closeAdjustments({ restore: true }));
    adjustApplyBtn.addEventListener("click", applyAdjustments);
    filterCancelTopBtn.addEventListener("click", () => closeFilters({ restore: true }));
    filterCancelBtn.addEventListener("click", () => closeFilters({ restore: true }));
    filterApplyBtn.addEventListener("click", applyFilter);
    filterOptions.forEach((option) => {
      option.addEventListener("change", () => {
        activeFilter = option.value;
        refreshPreview();
        syncFilterControls();
      });
    });
    adjustmentRanges.forEach((input) => {
      input.addEventListener("input", () => {
        syncAdjustmentControl(input.dataset.adjustment, input.value);
        previewAdjustments();
      });
    });
    adjustmentNumbers.forEach((input) => {
      input.addEventListener("input", () => {
        syncAdjustmentControl(input.dataset.adjustmentNumber, input.value);
        previewAdjustments();
      });
    });
    editorMode.addEventListener("change", () => updateEditor());
    editorCloseBtn.addEventListener("click", closeEditor);
    document.addEventListener("pointerdown", (event) => {
      if (editorEl.hidden) return;
      if (editorEl.contains(event.target)) return;
      closeEditor();
    });
    window.addEventListener("resize", () => {
      if (editingIndex !== null) positionEditor();
    });
    window.addEventListener("scroll", () => {
      if (editingIndex !== null) positionEditor();
    }, { passive: true });
    window.addEventListener("keydown", (event) => {
      if (event.key === "Escape") {
        if (!filterModal.hidden) {
          closeFilters({ restore: true });
          return;
        }
        if (!adjustmentModal.hidden) {
          closeAdjustments({ restore: true });
          return;
        }
        closeEditor();
      }
      const activeTag = document.activeElement.tagName;
      if (event.key === "z" && (event.ctrlKey || event.metaKey) && !event.shiftKey && !["INPUT", "TEXTAREA"].includes(activeTag)) {
        event.preventDefault();
        undoGeneration();
        return;
      }
      if ((event.key === "y" && (event.ctrlKey || event.metaKey)) || (event.key === "z" && (event.ctrlKey || event.metaKey) && event.shiftKey)) {
        if (!["INPUT", "TEXTAREA"].includes(activeTag)) {
          event.preventDefault();
          redoGeneration();
          return;
        }
      }
      if (event.code === "Space" && !["INPUT", "TEXTAREA"].includes(activeTag)) {
        event.preventDefault();
        if (activeTag === "SELECT") document.activeElement.blur();
        generatePalette();
      }
    });

    setToolbarIcons();
    loadSavedPalettes();
    loadTheme();
    loadGeneratorControls();
    initCodeExportModal();
    initSwatchInfoModal();
    if (!loadPaletteFromUrl() && !loadCurrentPalette()) {
      colors = new Array(5).fill(null).map(() => ({ hex: "#000000", name: "", locked: false }));
      colors = generateSmartPaletteHexes().map((hex) => ({ hex, name: closestCssName(hex), locked: false }));
    }
    pushToHistory(colors);
    renderPalette();
    renderSavedPalettes();
  </script>
</body>
</html>
