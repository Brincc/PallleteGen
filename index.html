<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PallleteGen™</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg%20width%3D%22100%25%22%20height%3D%22100%25%22%20viewBox%3D%220%200%2046%2044%22%20version%3D%221.1%22%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20xmlns%3Axlink%3D%22http%3A%2F%2Fwww.w3.org%2F1999%2Fxlink%22%20xml%3Aspace%3D%22preserve%22%20xmlns%3Aserif%3D%22http%3A%2F%2Fwww.serif.com%2F%22%20style%3D%22fill-rule%3Aevenodd%3Bclip-rule%3Aevenodd%3Bstroke-linejoin%3Around%3Bstroke-miterlimit%3A2%3B%22%3E%3Cg%3E%3Crect%20x%3D%22-0%22%20y%3D%220%22%20width%3D%229.379%22%20height%3D%2243.245%22%20style%3D%22fill%3A%23d85870%3Bfill-rule%3Anonzero%3B%22%2F%3E%3Crect%20x%3D%2218.141%22%20y%3D%220%22%20width%3D%229.379%22%20height%3D%2243.245%22%20style%3D%22fill%3A%234dcf63%3Bfill-rule%3Anonzero%3B%22%2F%3E%3Crect%20x%3D%2236.281%22%20y%3D%220%22%20width%3D%229.379%22%20height%3D%2243.245%22%20style%3D%22fill%3A%23438fdf%3Bfill-rule%3Anonzero%3B%22%2F%3E%3C%2Fg%3E%3C%2Fsvg%3E">
  <style>
    :root {
      color-scheme: light;
      --ink: #15171c;
      --muted: #687386;
      --line: #d7dde8;
      --panel: #ffffff;
      --panel-rgb: 255, 255, 255;
      --page: #edf1f7;
      --control: #ffffff;
      --control-soft: #f7f9fc;
      --control-hover: #ffffff;
      --button-bg: rgba(255, 255, 255, 0.9);
      --button-border-hover: #aab5c5;
      --accent: #1267d8;
      --accent-dark: #0c4fa9;
      --save-ink: #0c5748;
      --editor-bg: rgba(255, 255, 255, 0.96);
      --mint: #1d8b73;
      --danger: #b93030;
      --shadow: 0 20px 70px rgba(31, 42, 58, 0.14);
      --drag-shadow: 0 18px 46px rgba(21, 23, 28, 0.28);
      --page-wash: linear-gradient(135deg, rgba(255, 255, 255, 0.9), rgba(237, 241, 247, 0.82));
      --page-blue: radial-gradient(circle at 9% 5%, rgba(18, 103, 216, 0.16), transparent 30%);
      --page-green: radial-gradient(circle at 92% 16%, rgba(29, 139, 115, 0.12), transparent 28%);
    }

    body.dark-mode {
      color-scheme: dark;
      --ink: #edf3ff;
      --muted: #a9b5c7;
      --line: #344155;
      --panel: #2a2b31;
      --panel-rgb: 42, 43, 49;
      --page: #232429;
      --control: #232429;
      --control-soft: #2e3036;
      --control-hover: #34363d;
      --button-bg: rgba(35, 36, 41, 0.92);
      --button-border-hover: #607086;
      --accent: #62a2ff;
      --accent-dark: #4388e9;
      --save-ink: #7ee0c9;
      --editor-bg: rgba(35, 36, 41, 0.97);
      --danger: #ff8585;
      --shadow: 0 22px 80px rgba(0, 0, 0, 0.36);
      --drag-shadow: 0 18px 50px rgba(0, 0, 0, 0.52);
      --page-wash: linear-gradient(135deg, rgba(35, 36, 41, 0.96), rgba(42, 43, 49, 0.9));
      --page-blue: radial-gradient(circle at 9% 5%, rgba(98, 162, 255, 0.14), transparent 30%);
      --page-green: radial-gradient(circle at 92% 16%, rgba(126, 224, 201, 0.1), transparent 28%);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        var(--page-wash),
        var(--page-blue),
        var(--page-green),
        var(--page);
      transition: color 180ms ease, background 180ms ease;
    }

    button,
    input,
    select {
      font: inherit;
    }

    .app {
      width: min(1280px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0;
    }

    .topbar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 18px;
      align-items: center;
      margin-bottom: 18px;
    }

    .brand-logo {
      display: block;
      width: min(320px, 100%);
      line-height: 0;
    }

    .brand-logo-svg {
      display: block;
      width: 100%;
      height: auto;
    }

    .brand-logo-dark {
      display: none;
    }

    body.dark-mode .brand-logo-light {
      display: none;
    }

    body.dark-mode .brand-logo-dark {
      display: block;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 10px;
    }

    .palette-generate-group {
      display: inline-flex;
      gap: 6px;
      align-items: center;
      margin-right: 8px;
    }

    .harmony-picker {
      position: relative;
      display: inline-grid;
      width: 42px;
      height: 42px;
      flex: 0 0 42px;
    }

    .harmony-picker svg {
      position: absolute;
      top: 11px;
      left: 11px;
      width: 20px;
      height: 20px;
      fill: none;
      stroke: var(--ink);
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-width: 2.2;
      pointer-events: none;
    }

    .control-select {
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 36px 0 12px;
      color: var(--ink);
      background: var(--button-bg);
      cursor: pointer;
    }

    .harmony-select {
      width: 100%;
      height: 42px;
      padding: 0;
      color: transparent;
      appearance: none;
    }

    .harmony-select:focus {
      color: transparent;
    }

    .harmony-select optgroup,
    .harmony-select option {
      color: #15171c;
      background: #ffffff;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 14px;
      color: var(--ink);
      background: var(--button-bg);
      cursor: pointer;
      transition: transform 150ms ease, border-color 150ms ease, background 150ms ease, box-shadow 150ms ease;
      white-space: nowrap;
    }

    .button:hover {
      transform: translateY(-1px);
      border-color: var(--button-border-hover);
      background: var(--control-hover);
      box-shadow: 0 8px 20px rgba(31, 42, 58, 0.08);
    }

    .button.primary {
      border-color: var(--accent);
      color: #fff;
      background: var(--accent);
    }

    .button.primary:hover {
      background: var(--accent-dark);
    }

    .button svg {
      width: 18px;
      height: 18px;
      flex: 0 0 18px;
      fill: none;
      stroke: currentColor;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-width: 2.2;
    }

    .button.save {
      border-color: rgba(29, 139, 115, 0.35);
      color: var(--save-ink);
    }

    .button.danger {
      color: var(--danger);
    }

    .button.icon {
      width: 38px;
      min-width: 38px;
      min-height: 38px;
      padding: 0;
      border-radius: 8px;
    }

    .button.icon svg {
      width: 18px;
      height: 18px;
      fill: none;
      stroke: currentColor;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-width: 2.2;
    }

    .button.theme-toggle {
      min-width: 46px;
      padding: 0 12px;
    }

    .toolbar .button.icon {
      width: 42px;
      min-width: 42px;
      min-height: 42px;
    }

    .button.theme-toggle svg {
      width: 18px;
      height: 18px;
      fill: none;
      stroke: currentColor;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-width: 2.2;
    }

    .button:disabled {
      opacity: 0.42;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .workspace {
      display: grid;
      grid-template-columns: 1fr;
      gap: 18px;
      align-items: start;
    }

    .palette-shell,
    .saved-panel {
      overflow: hidden;
      border: 1px solid rgba(151, 161, 181, 0.38);
      border-radius: 8px;
      background: rgba(var(--panel-rgb), 0.86);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .palette {
      display: grid;
      grid-template-columns: repeat(var(--count), minmax(88px, 1fr));
      min-height: clamp(420px, 62vh, 680px);
    }

    .swatch {
      position: relative;
      display: flex;
      min-width: 0;
      flex-direction: column;
      justify-content: space-between;
      padding: 16px 12px;
      color: var(--label-color);
      background: var(--swatch-color);
      cursor: pointer;
      transition: background-color 180ms ease, box-shadow 160ms ease, filter 160ms ease, transform 160ms ease;
    }

    .swatch:hover {
      filter: saturate(1.05);
    }

    .swatch.dragging {
      opacity: 0.72;
      filter: saturate(0.86);
      transform: scale(0.985);
      box-shadow: inset 0 0 0 2px rgba(255, 255, 255, 0.36);
    }

    .swatch.drag-over {
      z-index: 1;
      box-shadow: inset 0 0 0 4px rgba(255, 255, 255, 0.72), inset 0 0 0 7px rgba(21, 23, 28, 0.18);
    }

    .drag-preview {
      position: fixed;
      top: -120px;
      left: -120px;
      display: grid;
      gap: 5px;
      width: 122px;
      border: 1px solid rgba(255, 255, 255, 0.5);
      border-radius: 8px;
      padding: 12px;
      color: var(--drag-label-color);
      background: var(--drag-color);
      box-shadow: var(--drag-shadow);
      pointer-events: none;
    }

    .drag-preview::before {
      content: "";
      width: 28px;
      height: 4px;
      border-radius: 999px;
      background: currentColor;
      opacity: 0.58;
    }

    .drag-preview strong,
    .drag-preview span {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .drag-preview strong {
      font-size: 0.78rem;
    }

    .drag-preview span {
      font-size: 0.72rem;
      opacity: 0.86;
    }

    .swatch-actions {
      display: flex;
      justify-content: space-between;
      gap: 8px;
    }

    .swatch-actions .copy-hex-button {
      margin-left: auto;
    }

    .swatch .button {
      border-color: rgba(255, 255, 255, 0.34);
      color: var(--label-color);
      background: rgba(255, 255, 255, 0.18);
      backdrop-filter: blur(12px);
    }

    .swatch.dark-ui .button {
      border-color: rgba(0, 0, 0, 0.18);
      background: rgba(0, 0, 0, 0.08);
    }

    .swatch .button:hover {
      background: rgba(255, 255, 255, 0.3);
    }

    .swatch.dark-ui .button:hover {
      background: rgba(0, 0, 0, 0.15);
    }

    .color-info {
      display: grid;
      gap: 8px;
    }

    .swatch-name,
    .hex-field,
    .rgb-value {
      width: 100%;
      min-width: 0;
      border: 0;
      border-radius: 0;
      padding: 0;
      color: var(--label-color);
      background: transparent;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 0;
      outline: none;
      appearance: none;
      cursor: copy;
    }

    .swatch-name,
    .rgb-value {
      cursor: default;
      text-transform: none;
      font-size: 0.84rem;
      line-height: 1.25;
    }

    .swatch-name {
      font-weight: 800;
    }

    .color-editor {
      position: fixed;
      top: var(--editor-top, 24px);
      left: var(--editor-left, 24px);
      z-index: 4;
      width: min(360px, calc(100vw - 32px));
      border: 1px solid rgba(151, 161, 181, 0.48);
      border-radius: 8px;
      padding: 14px;
      background: var(--editor-bg);
      box-shadow: 0 24px 80px rgba(21, 23, 28, 0.22);
      backdrop-filter: blur(18px);
    }

    .color-editor[hidden] {
      display: none;
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 8;
      display: flex;
      align-items: flex-start;
      justify-content: flex-end;
      padding: 96px 24px 24px;
      background: transparent;
      pointer-events: none;
    }

    .modal-overlay[hidden] {
      display: none;
    }

    .adjustments-dialog {
      width: min(440px, 100%);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
      color: var(--ink);
      background: var(--panel);
      box-shadow: var(--shadow);
      pointer-events: auto;
    }

    .adjustments-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .adjustments-top h2 {
      margin: 0;
      font-size: 1rem;
      line-height: 1.2;
    }

    .adjustment-fields {
      display: grid;
      gap: 12px;
    }

    .adjustment-field {
      display: grid;
      grid-template-columns: 92px 1fr 72px;
      gap: 10px;
      align-items: center;
    }

    .adjustment-field label {
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 700;
      text-transform: uppercase;
    }

    .adjustment-field input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
    }

    .adjustment-field input[type="number"] {
      width: 100%;
      min-height: 36px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 8px;
      color: var(--ink);
      background: var(--control);
      text-align: right;
    }

    .adjustment-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 16px;
    }

    .filter-options {
      display: grid;
      gap: 8px;
    }

    .filter-option {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 10px;
      background: var(--control-soft);
      cursor: pointer;
    }

    .filter-option input {
      width: 16px;
      height: 16px;
      margin: 0;
      accent-color: var(--accent);
    }

    .editor-top {
      display: grid;
      grid-template-columns: 44px 1fr auto;
      gap: 10px;
      align-items: center;
      margin-bottom: 12px;
    }

    .editor-preview {
      width: 44px;
      height: 44px;
      border: 1px solid rgba(21, 23, 28, 0.12);
      border-radius: 8px;
      background: var(--editor-color);
    }

    .editor-title {
      display: grid;
      gap: 4px;
      min-width: 0;
    }

    .editor-title strong,
    .editor-title span {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .editor-title span {
      color: var(--muted);
      font-size: 0.84rem;
    }

    .editor-mode {
      width: 100%;
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 10px;
      color: var(--ink);
      background: var(--control);
    }

    .editor-name {
      width: 100%;
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 8px;
      margin-bottom: 10px;
      padding: 0 10px;
      color: var(--ink);
      background: var(--control);
      outline: none;
    }

    .editor-name:focus {
      border-color: rgba(18, 103, 216, 0.34);
      box-shadow: 0 0 0 3px rgba(18, 103, 216, 0.1);
    }

    .editor-picker {
      display: grid;
      gap: 10px;
    }

    .picker-plane {
      position: relative;
      width: 100%;
      aspect-ratio: 1.45;
      border: 1px solid var(--line);
      border-radius: 8px;
      background:
        linear-gradient(to top, #000, transparent),
        linear-gradient(to right, #fff, hsl(var(--picker-hue), 100%, 50%));
      cursor: pointer;
      overflow: hidden;
      touch-action: none;
    }

    .picker-target {
      position: absolute;
      left: var(--picker-x);
      top: var(--picker-y);
      width: 18px;
      height: 18px;
      border: 2px solid #fff;
      border-radius: 50%;
      box-shadow: 0 0 0 1px rgba(21, 23, 28, 0.55), 0 2px 10px rgba(21, 23, 28, 0.35);
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .picker-hue-row {
      display: grid;
      grid-template-columns: 52px 1fr;
      gap: 8px;
      align-items: center;
    }

    .picker-hue-row label {
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 700;
      text-transform: uppercase;
    }

    .picker-hue-row input[type="range"] {
      width: 100%;
      height: 10px;
      border-radius: 999px;
      background: linear-gradient(90deg, #ff0000, #ffff00, #00ff00, #00ffff, #0000ff, #ff00ff, #ff0000);
      cursor: pointer;
      appearance: none;
    }

    .picker-hue-row input[type="range"]::-webkit-slider-runnable-track {
      height: 10px;
      border-radius: 999px;
      background: linear-gradient(90deg, #ff0000, #ffff00, #00ff00, #00ffff, #0000ff, #ff00ff, #ff0000);
    }

    .picker-hue-row input[type="range"]::-webkit-slider-thumb {
      width: 20px;
      height: 20px;
      border: 2px solid #fff;
      border-radius: 50%;
      margin-top: -5px;
      background: hsl(var(--picker-hue), 100%, 50%);
      box-shadow: 0 2px 10px rgba(21, 23, 28, 0.28);
      appearance: none;
    }

    .picker-hue-row input[type="range"]::-moz-range-track {
      height: 10px;
      border-radius: 999px;
      background: linear-gradient(90deg, #ff0000, #ffff00, #00ff00, #00ffff, #0000ff, #ff00ff, #ff0000);
    }

    .picker-hue-row input[type="range"]::-moz-range-thumb {
      width: 18px;
      height: 18px;
      border: 2px solid #fff;
      border-radius: 50%;
      background: hsl(var(--picker-hue), 100%, 50%);
      box-shadow: 0 2px 10px rgba(21, 23, 28, 0.28);
    }

    .editor-fields {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }

    .editor-field {
      display: grid;
      grid-template-columns: 52px 1fr 78px;
      gap: 8px;
      align-items: center;
    }

    .editor-field label {
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 700;
      text-transform: uppercase;
    }

    .editor-field input[type="range"] {
      width: 100%;
      height: 10px;
      border-radius: 999px;
      background: var(--range-track, linear-gradient(90deg, #d7dde8, #1267d8));
      accent-color: var(--range-accent, var(--accent));
      cursor: pointer;
      appearance: none;
    }

    .editor-field input[type="range"]::-webkit-slider-runnable-track {
      height: 10px;
      border-radius: 999px;
      background: var(--range-track, linear-gradient(90deg, #d7dde8, #1267d8));
    }

    .editor-field input[type="range"]::-webkit-slider-thumb {
      width: 20px;
      height: 20px;
      border: 2px solid #fff;
      border-radius: 50%;
      margin-top: -5px;
      background: var(--range-accent, var(--accent));
      box-shadow: 0 2px 10px rgba(21, 23, 28, 0.28);
      appearance: none;
    }

    .editor-field input[type="range"]::-moz-range-track {
      height: 10px;
      border-radius: 999px;
      background: var(--range-track, linear-gradient(90deg, #d7dde8, #1267d8));
    }

    .editor-field input[type="range"]::-moz-range-thumb {
      width: 18px;
      height: 18px;
      border: 2px solid #fff;
      border-radius: 50%;
      background: var(--range-accent, var(--accent));
      box-shadow: 0 2px 10px rgba(21, 23, 28, 0.28);
    }

    .editor-field input[type="number"],
    .editor-hex {
      width: 100%;
      min-height: 36px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 9px;
      color: var(--ink);
      background: var(--control);
      outline: none;
    }

    .editor-hex {
      margin-top: 10px;
      text-transform: uppercase;
    }

    .saved-panel {
      padding: 16px;
    }

    .panel-header {
      display: flex;
      align-items: start;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 14px;
    }

    .panel-header h2 {
      margin: 0 0 4px;
      font-size: 1.05rem;
      letter-spacing: 0;
    }

    .panel-header p,
    .empty-state {
      margin: 0;
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.4;
    }

    .saved-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 12px;
      max-height: 640px;
      overflow: auto;
      padding-right: 3px;
    }

    .saved-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--control);
      overflow: hidden;
    }

    .saved-strip {
      display: grid;
      grid-template-columns: repeat(var(--saved-count), 1fr);
      height: 36px;
    }

    .saved-meta {
      display: grid;
      gap: 8px;
      padding: 10px;
    }

    .saved-top {
      display: grid;
      grid-template-columns: minmax(120px, 240px) max-content;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
    }

    .saved-name-field {
      width: 100%;
      border: 1px solid transparent;
      border-radius: 8px;
      margin: 0;
      padding: 7px 8px;
      color: var(--ink);
      background: var(--control-soft);
      font-size: 0.92rem;
      font-weight: 700;
      outline: none;
    }

    .saved-name-field:focus {
      border-color: rgba(18, 103, 216, 0.34);
      background: var(--control);
      box-shadow: 0 0 0 3px rgba(18, 103, 216, 0.1);
    }

    .saved-hexes {
      margin: 0;
      color: var(--muted);
      font-size: 0.82rem;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .saved-actions {
      display: grid;
      grid-template-columns: repeat(2, max-content);
      gap: 6px;
      justify-content: end;
    }

    .saved-actions .button {
      min-height: 32px;
      min-width: 64px;
      padding: 0 10px;
      font-size: 0.84rem;
    }

    .empty-state {
      border: 1px dashed #b9c2d1;
      border-radius: 8px;
      padding: 18px;
      background: rgba(var(--panel-rgb), 0.58);
    }

    .toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 5;
      max-width: min(320px, calc(100vw - 36px));
      border: 1px solid rgba(21, 23, 28, 0.12);
      border-radius: 8px;
      padding: 12px 14px;
      color: #fff;
      background: rgba(21, 23, 28, 0.9);
      box-shadow: 0 12px 34px rgba(21, 23, 28, 0.2);
      opacity: 0;
      transform: translateY(10px);
      pointer-events: none;
      transition: opacity 160ms ease, transform 160ms ease;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    @media (max-width: 980px) {
      .workspace {
        grid-template-columns: 1fr;
      }

      .saved-list {
        grid-template-columns: 1fr;
        max-height: none;
      }
    }

    @media (max-width: 760px) {
      .app {
        width: min(100% - 20px, 620px);
        padding: 18px 0;
      }

      .topbar {
        grid-template-columns: 1fr;
      }

      .toolbar {
        justify-content: stretch;
      }

      .palette-generate-group {
        flex: 1 1 100%;
        margin-right: 0;
      }

      .toolbar .palette-generate-group .button {
        flex: 1 1 calc(50% - 3px);
      }

      .toolbar .palette-generate-group .harmony-picker {
        flex: 0 0 42px;
      }

      .toolbar .button {
        flex: 1 1 calc(50% - 8px);
      }

      .toolbar .button.icon {
        flex: 0 0 42px;
      }

      .toolbar .harmony-picker,
      .toolbar .theme-toggle {
        flex: 1 1 calc(50% - 8px);
      }

      .palette {
        grid-template-columns: 1fr;
        min-height: auto;
      }

      .swatch {
        min-height: 168px;
      }

      .color-editor {
        width: calc(100vw - 20px);
      }

      .modal-overlay {
        justify-content: center;
        padding: 88px 10px 18px;
      }

      .adjustments-dialog {
        width: min(360px, 100%);
      }
    }

    @media (max-width: 480px) {
      .color-editor {
        width: calc(100vw - 20px);
      }
    }
  </style>
</head>

    function randomHex() {
      const value = Math.floor(Math.random() * 0xffffff);
      return `#${value.toString(16).padStart(6, "0").toUpperCase()}`;
    }

    function randomBetween(min, max) {
      return min + Math.random() * (max - min);
    }

    function pickRandom(items) {
      return items[Math.floor(Math.random() * items.length)];
    }

    function wrapHue(hue) {
      return ((hue % 360) + 360) % 360;
    }

    function hslToHex(hsl) {
      return rgbToHex(hslToRgb(hsl));
    }

    function shiftedValue(value, amount, min, max) {
      return clamp(value + randomBetween(-amount, amount), min, max);
    }

    function normalizeHex(value) {
      const cleaned = value.trim().replace("#", "");
      if (/^[0-9a-f]{3}$/i.test(cleaned)) {
        return `#${cleaned.split("").map((char) => char + char).join("").toUpperCase()}`;
      }
      if (/^[0-9a-f]{6}$/i.test(cleaned)) {
        return `#${cleaned.toUpperCase()}`;
      }
      return null;
    }

    function getContrastColor(hex) {
      const r = parseInt(hex.slice(1, 3), 16);
      const g = parseInt(hex.slice(3, 5), 16);
      const b = parseInt(hex.slice(5, 7), 16);
      const luminance = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
      return luminance > 0.62 ? "#15171C" : "#FFFFFF";
    }

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, Number(value)));
    }

    function hexToRgb(hex) {
      return {
        r: parseInt(hex.slice(1, 3), 16),
        g: parseInt(hex.slice(3, 5), 16),
        b: parseInt(hex.slice(5, 7), 16)
      };
    }

    function rgbToHex({ r, g, b }) {
      return `#${[r, g, b].map((value) => Math.round(clamp(value, 0, 255)).toString(16).padStart(2, "0")).join("").toUpperCase()}`;
    }

    function grayscaleHex(hex) {
      const { r, g, b } = hexToRgb(hex);
      const gray = Math.round(0.299 * r + 0.587 * g + 0.114 * b);
      return rgbToHex({ r: gray, g: gray, b: gray });
    }

    function colorBlindHex(hex, type) {
      const matrices = {

          [0.558, 0.442, 0],
          [0, 0.242, 0.758]
        ],
        deuteranopia: [
          [0.625, 0.375, 0],
          [0.7, 0.3, 0],
          [0, 0.3, 0.7]
        ],
        tritanopia: [
          [0.95, 0.05, 0],
          [0, 0.433, 0.567],
          [0, 0.475, 0.525]
        ]
      };
      const matrix = matrices[type];
      if (!matrix) return hex;
      const { r, g, b } = hexToRgb(hex);
      return rgbToHex({
        r: matrix[0][0] * r + matrix[0][1] * g + matrix[0][2] * b,
        g: matrix[1][0] * r + matrix[1][1] * g + matrix[1][2] * b,
        b: matrix[2][0] * r + matrix[2][1] * g + matrix[2][2] * b
      });
    }

    function filteredHex(hex, filter = activeFilter) {
      if (filter === "grayscale") return grayscaleHex(hex);
      if (["protanopia", "deuteranopia", "tritanopia"].includes(filter)) return colorBlindHex(hex, filter);
      return hex;
    }

    function cmykPreviewHex(hex) {
      const cmyk = rgbToCmyk(hexToRgb(hex));
      const inkCoverage = cmyk.c + cmyk.m + cmyk.y + cmyk.k;
      if (inkCoverage < 2) return hex;

      const printedRgb = cmykToRgb({
        c: clamp(cmyk.c * 0.98, 0, 100),
        m: clamp(cmyk.m * 0.98, 0, 100),
        y: clamp(cmyk.y * 0.96, 0, 100),
        k: clamp(cmyk.k * 1.02, 0, 100)
      });
      const hsl = rgbToHsl(printedRgb);
      const saturationLoss = hsl.s > 55 ? 0.86 : hsl.s > 28 ? 0.94 : 1;
      const lightnessShift = cmyk.k > 55 ? -2 : cmyk.k > 25 ? -1 : 0;
      const softenedRgb = hslToRgb({
        h: hsl.h,
        s: clamp(hsl.s * saturationLoss, 0, 100),
        l: clamp(hsl.l + lightnessShift, 0, 100)
      });
      return rgbToHex(softenedRgb);
    }

    function previewHex(hex) {
      return filteredHex(hex);
    }

    function rgbText(hex) {
      const { r, g, b } = hexToRgb(hex);
      return `RGB ${r}, ${g}, ${b}`;
    }

    function hslText(hex) {
      const { h, s, l } = rgbToHsl(hexToRgb(hex));
      return `HSL ${h}, ${s}%, ${l}%`;
    }

    function colorDisplayName(color, index) {
      return color.name?.trim() || `Color ${index + 1}`;
    }

    function rgbToHsv({ r, g, b }) {
      r /= 255; g /= 255; b /= 255;
      const max = Math.max(r, g, b);
      const min = Math.min(r, g, b);
      const delta = max - min;
      let h = 0;
      if (delta) {
        if (max === r) h = ((g - b) / delta) % 6;
        if (max === g) h = (b - r) / delta + 2;
        if (max === b) h = (r - g) / delta + 4;
        h *= 60;
        if (h < 0) h += 360;
      }
      return { h: Math.round(h), s: Math.round((max ? delta / max : 0) * 100), b: Math.round(max * 100) };
    }

    function hsvToRgb({ h, s, b }) {
      h = ((clamp(h, 0, 360) % 360) + 360) % 360;
      s = clamp(s, 0, 100) / 100;
      b = clamp(b, 0, 100) / 100;
      const c = b * s;
      const x = c * (1 - Math.abs((h / 60) % 2 - 1));
      const m = b - c;
      let r = 0, g = 0, blue = 0;
      if (h < 60) [r, g, blue] = [c, x, 0];
      else if (h < 120) [r, g, blue] = [x, c, 0];
      else if (h < 180) [r, g, blue] = [0, c, x];
      else if (h < 240) [r, g, blue] = [0, x, c];
      else if (h < 300) [r, g, blue] = [x, 0, c];
      else [r, g, blue] = [c, 0, x];
      return { r: (r + m) * 255, g: (g + m) * 255, b: (blue + m) * 255 };
    }

    function rgbToHsl({ r, g, b }) {
      r /= 255; g /= 255; b /= 255;
      const max = Math.max(r, g, b);
      const min = Math.min(r, g, b);
      const delta = max - min;
      const l = (max + min) / 2;
      let h = 0;
      let s = 0;
      if (delta) {
        s = delta / (1 - Math.abs(2 * l - 1));
        if (max === r) h = ((g - b) / delta) % 6;
        if (max === g) h = (b - r) / delta + 2;
        if (max === b) h = (r - g) / delta + 4;
        h *= 60;
        if (h < 0) h += 360;
      }
      return { h: Math.round(h), s: Math.round(s * 100), l: Math.round(l * 100) };
    }

    function hslToRgb({ h, s, l }) {
      h = ((clamp(h, 0, 360) % 360) + 360) % 360;
      s = clamp(s, 0, 100) / 100;
      l = clamp(l, 0, 100) / 100;
      const c = (1 - Math.abs(2 * l - 1)) * s;
      const x = c * (1 - Math.abs((h / 60) % 2 - 1));
      const m = l - c / 2;
      let r = 0, g = 0, b = 0;
      if (h < 60) [r, g, b] = [c, x, 0];
      else if (h < 120) [r, g, b] = [x, c, 0];
      else if (h < 180) [r, g, b] = [0, c, x];
      else if (h < 240) [r, g, b] = [0, x, c];
      else if (h < 300) [r, g, b] = [x, 0, c];
      else [r, g, b] = [c, 0, x];
      return { r: (r + m) * 255, g: (g + m) * 255, b: (b + m) * 255 };
    }

    function adjustedPaletteHex(hex, adjustments) {
      const hsl = rgbToHsl(hexToRgb(hex));
      const shiftedRgb = hslToRgb({
        h: wrapHue(hsl.h + adjustments.hue),
        s: clamp(hsl.s + adjustments.saturation, 0, 100),
        l: clamp(hsl.l + adjustments.brightness, 0, 100)
      });
      const temperature = adjustments.temperature;
      return rgbToHex({
        r: shiftedRgb.r + (temperature > 0 ? temperature * 0.8 : temperature * 0.25),
        g: shiftedRgb.g + (temperature > 0 ? temperature * 0.18 : Math.abs(temperature) * 0.12),
        b: shiftedRgb.b + (temperature > 0 ? -temperature * 0.65 : Math.abs(temperature) * 0.85)
      });
    }

    function rgbToCmyk({ r, g, b }) {
      r /= 255; g /= 255; b /= 255;
      const k = 1 - Math.max(r, g, b);
      if (k === 1) return { c: 0, m: 0, y: 0, k: 100 };
      return {
        c: Math.round(((1 - r - k) / (1 - k)) * 100),
        m: Math.round(((1 - g - k) / (1 - k)) * 100),
        y: Math.round(((1 - b - k) / (1 - k)) * 100),
        k: Math.round(k * 100)
      };
    }

    function cmykToRgb({ c, m, y, k }) {
      c = clamp(c, 0, 100) / 100;
      m = clamp(m, 0, 100) / 100;
      y = clamp(y, 0, 100) / 100;
      k = clamp(k, 0, 100) / 100;
      return {
        r: 255 * (1 - c) * (1 - k),
        g: 255 * (1 - m) * (1 - k),
        b: 255 * (1 - y) * (1 - k)
      };
    }

    function pivotRgb(value) {
      value /= 255;
      return value > 0.04045 ? Math.pow((value + 0.055) / 1.055, 2.4) : value / 12.92;
    }

    function rgbToLab(rgb) {
      const r = pivotRgb(rgb.r);
      const g = pivotRgb(rgb.g);
      const b = pivotRgb(rgb.b);
      let x = (r * 0.4124 + g * 0.3576 + b * 0.1805) / 0.95047;
      let y = (r * 0.2126 + g * 0.7152 + b * 0.0722) / 1.00000;
      let z = (r * 0.0193 + g * 0.1192 + b * 0.9505) / 1.08883;
      const f = (value) => value > 0.008856 ? Math.cbrt(value) : (7.787 * value) + 16 / 116;
      x = f(x); y = f(y); z = f(z);
      return { l: Math.round((116 * y - 16) * 10) / 10, a: Math.round((500 * (x - y)) * 10) / 10, b: Math.round((200 * (y - z)) * 10) / 10 };
    }

    function labToRgb({ l, a, b }) {
      let y = (clamp(l, 0, 100) + 16) / 116;
      let x = clamp(a, -128, 127) / 500 + y;
      let z = y - clamp(b, -128, 127) / 200;
      const f = (value) => Math.pow(value, 3) > 0.008856 ? Math.pow(value, 3) : (value - 16 / 116) / 7.787;
      x = 0.95047 * f(x);
      y = 1.00000 * f(y);
      z = 1.08883 * f(z);
      let r = x * 3.2406 + y * -1.5372 + z * -0.4986;
      let g = x * -0.9689 + y * 1.8758 + z * 0.0415;
      let blue = x * 0.0557 + y * -0.2040 + z * 1.0570;
      const gamma = (value) => {
        value = Math.max(0, value);
        return value > 0.0031308 ? 1.055 * Math.pow(value, 1 / 2.4) - 0.055 : 12.92 * value;
      };
      return { r: gamma(r) * 255, g: gamma(g) * 255, b: gamma(blue) * 255 };
    }

    function isLight(hex) {
      return getContrastColor(hex) === "#15171C";
    }

    function setToolbarIcons() {
      addBtn.innerHTML = `${iconSvg("plus")}<span>Add Color</span>`;

      adjustBtn.innerHTML = iconSvg("sliders");
      saveBtn.innerHTML = iconSvg("save");
      exportBtn.innerHTML = iconSvg("export");
    }

    function applyTheme(theme) {
      const isDark = theme === "dark";
      document.body.classList.toggle("dark-mode", isDark);
      themeBtn.innerHTML = iconSvg(isDark ? "sun" : "moon");
      themeBtn.title = isDark ? "Switch to light mode" : "Switch to dark mode";
      themeBtn.setAttribute("aria-label", themeBtn.title);
      themeBtn.setAttribute("aria-pressed", String(isDark));
    }

    function loadTheme() {
      const storedTheme = localStorage.getItem(themeStorageKey);
      const preferredTheme = window.matchMedia?.("(prefers-color-scheme: dark)").matches ? "dark" : "light";
      applyTheme(storedTheme || preferredTheme);
    }

    function toggleTheme() {
      const nextTheme = document.body.classList.contains("dark-mode") ? "light" : "dark";
      localStorage.setItem(themeStorageKey, nextTheme);
      applyTheme(nextTheme);
    }

    function loadGeneratorControls() {
      const storedHarmony = localStorage.getItem(harmonyStorageKey);
      if (storedHarmony && harmonySelect.querySelector(`option[value="${storedHarmony}"]`)) {
        harmonySelect.value = storedHarmony;
      }

      try {
        const preview = JSON.parse(localStorage.getItem(previewStorageKey) || "{}");
        activeFilter = preview.filter || (preview.grayscale ? "grayscale" : "none");
      } catch {
        activeFilter = "none";
      }
      syncFilterControls();
      syncHarmonyControl();
    }

    function persistPreviewControls() {
      localStorage.setItem(harmonyStorageKey, harmonySelect.value);
      localStorage.setItem(previewStorageKey, JSON.stringify({
        filter: activeFilter
      }));
      syncHarmonyControl();
    }

    function syncHarmonyControl() {
      const selectedOption = harmonySelect.options[harmonySelect.selectedIndex];
      Array.from(harmonySelect.options).forEach((option) => {
        const label = option.dataset.label || option.textContent.replace(/^✓\s*/, "");
        option.dataset.label = label;
        option.textContent = option.selected ? `✓ ${label}` : label;
      });
      const label = selectedOption?.dataset.label || "Random";
      harmonyPicker.title = `Harmony: ${label}`;
      harmonySelect.title = `Harmony: ${label}`;
      harmonyIcon.innerHTML = iconSvg("chevronDown");
    }

    function syncFilterControls() {
      filterOptions.forEach((option) => {
        option.checked = option.value === activeFilter;
      });
      filtersBtn.title = activeFilter === "none" ? "Preview color filters" : `Filter: ${activeFilter}`;
    }

    function refreshPreview() {
      persistPreviewControls();
      renderPalette();
      renderSavedPalettes();
      syncEditorChrome();
    }

    function openFilters() {
      closeEditor();
      filterBeforeOpen = activeFilter;
      syncFilterControls();
      filterModal.hidden = false;
      filterCancelTopBtn.innerHTML = iconSvg("x");
    }

    function closeFilters({ restore = false } = {}) {
      if (restore) {
        activeFilter = filterBeforeOpen;
        refreshPreview();
      }
      filterModal.hidden = true;
      filterBeforeOpen = activeFilter;
      syncFilterControls();
    }

    function applyFilter() {
      if (activeFilter !== "none") {
        colors = colors.map((color) => ({
          ...color,
          hex: filteredHex(color.hex, activeFilter)
        }));
        activeFilter = "none";
        showToast("Filter applied to palette.");
      }
      closeFilters();
      refreshPreview();
    }

    function copyText(text) {
      if (navigator.clipboard && window.isSecureContext) {
        navigator.clipboard.writeText(text).then(() => showToast(`${text} copied.`)).catch(() => fallbackCopy(text));
        return;
      }
      fallbackCopy(text);
    }

    function fallbackCopy(text) {
      const copyInput = document.createElement("textarea");
      copyInput.value = text;
      copyInput.style.position = "fixed";
      copyInput.style.opacity = "0";
      document.body.append(copyInput);
      copyInput.focus();
      copyInput.select();
      document.execCommand("copy");
      copyInput.remove();
      showToast(`${text} copied.`);
    }

    function syncEditorChrome() {
      if (editingIndex === null || !colors[editingIndex]) return;
      const color = colors[editingIndex];
      const hex = color.hex;
      const displayHex = previewHex(hex);
      editorEl.style.setProperty("--editor-color", hex);
      editorPreview.style.background = displayHex;
      editorHeading.textContent = colorDisplayName(color, editingIndex);
      editorHexLabel.textContent = `${hex} · ${rgbText(hex)}`;
      const hexInput = editorFields.querySelector(".editor-hex");
      if (hexInput) hexInput.value = hex;
      editorFields.querySelectorAll('input[type="range"]').forEach((range) => {
        range.style.setProperty("--range-accent", hex);
      });
    }

    function positionEditor(anchorEl) {
      const swatch = anchorEl || paletteEl.querySelector(`[data-color-index="${editingIndex}"]`);
      if (!swatch) return;

      const swatchRect = swatch.getBoundingClientRect();
      const editorRect = editorEl.getBoundingClientRect();
      const gap = 10;
      const viewportPadding = window.innerWidth <= 760 ? 10 : 16;
      const maxLeft = Math.max(viewportPadding, window.innerWidth - editorRect.width - viewportPadding);
      const maxTop = Math.max(viewportPadding, window.innerHeight - editorRect.height - viewportPadding);
      const centeredLeft = swatchRect.left + (swatchRect.width - editorRect.width) / 2;
      let top = swatchRect.top + (swatchRect.height - editorRect.height) / 2;

      if (editorRect.height + gap * 2 < swatchRect.height) {
        top = swatchRect.top + gap;
      }

      editorEl.style.setProperty("--editor-left", `${clamp(centeredLeft, viewportPadding, maxLeft)}px`);
      editorEl.style.setProperty("--editor-top", `${clamp(top, viewportPadding, maxTop)}px`);
    }

        positionEditor();

      syncEditorChrome();

      return { values: rgb, fields: [], toHex: (v) => rgbToHex(v) };
    }

          l: `linear-gradient(90deg, ${labHex({ l: 0 })}, ${labHex({ l: 50 })}, ${labHex({ l: 100 })})`,
          a: `linear-gradient(90deg, ${labHex({ a: -128 })}, ${labHex({ a: 0 })}, ${labHex({ a: 127 })})`,
          b: `linear-gradient(90deg, ${labHex({ b: -128 })}, ${labHex({ b: 0 })}, ${labHex({ b: 127 })})`
        }
      };
      return tracks[mode]?.[key] || "linear-gradient(90deg, #d7dde8, #1267d8)";
    }

    function syncSliderTracks(mode, values) {
      editorFields.querySelectorAll('input[type="range"]').forEach((range) => {
        range.style.setProperty("--range-track", sliderTrack(mode, range.dataset.key, values));
        range.style.setProperty("--range-accent", colors[editingIndex].hex);
      });
    }

    function syncPickerSurface(pickerEl, values) {
      pickerEl.style.setProperty("--picker-hue", values.h);
      pickerEl.style.setProperty("--picker-x", `${values.s}%`);
      pickerEl.style.setProperty("--picker-y", `${100 - values.b}%`);
    }

    function renderPickerEditor(config, editorValues) {
      const picker = document.createElement("div");
      picker.className = "editor-picker";
      syncPickerSurface(picker, editorValues);

      const plane = document.createElement("div");
      plane.className = "picker-plane";
      plane.setAttribute("role", "slider");
      plane.setAttribute("aria-label", "Saturation and brightness");
      plane.tabIndex = 0;

      const target = document.createElement("div");
      target.className = "picker-target";
      plane.append(target);

      const hueRow = document.createElement("div");
      hueRow.className = "picker-hue-row";

      const hueLabel = document.createElement("label");
      hueLabel.textContent = "H";

      const hueRange = document.createElement("input");
      hueRange.type = "range";
      hueRange.min = 0;
      hueRange.max = 360;
      hueRange.step = 1;
      hueRange.value = editorValues.h;
      hueRange.setAttribute("aria-label", "Hue");

      const applyPickerValue = () => {
        syncPickerSurface(picker, editorValues);
        setEditingColor(config.toHex(editorValues));
      };

      const updatePlaneValue = (event) => {
        const rect = plane.getBoundingClientRect();
        editorValues.s = Math.round(clamp(((event.clientX - rect.left) / rect.width) * 100, 0, 100));
        editorValues.b = Math.round(clamp(100 - ((event.clientY - rect.top) / rect.height) * 100, 0, 100));
        plane.setAttribute("aria-valuetext", `S ${editorValues.s}, B ${editorValues.b}`);
        applyPickerValue();
      };

      let draggingPlane = false;
      plane.addEventListener("pointerdown", (event) => {
        draggingPlane = true;
        plane.setPointerCapture(event.pointerId);
        updatePlaneValue(event);
      });
      plane.addEventListener("pointermove", (event) => {
        if (!draggingPlane) return;
        updatePlaneValue(event);
      });
      plane.addEventListener("pointerup", () => {
        draggingPlane = false;
      });
      plane.addEventListener("pointercancel", () => {
        draggingPlane = false;
      });

      hueRange.addEventListener("input", () => {
        editorValues.h = Number(hueRange.value);
        applyPickerValue();
      });

      hueRow.append(hueLabel, hueRange);
      picker.append(plane, hueRow);
      editorFields.append(picker);
    }

    function updateEditor(anchorEl) {
      if (editingIndex === null || !colors[editingIndex]) {
        editorEl.hidden = true;
        return;
      }

      const color = colors[editingIndex];
      const hex = color.hex;
      editorEl.hidden = false;
      syncEditorChrome();
      requestAnimationFrame(() => positionEditor(anchorEl));
      editorCloseBtn.innerHTML = iconSvg("x");
      editorFields.innerHTML = "";

      const nameInput = document.createElement("input");
      nameInput.className = "editor-name";
      nameInput.value = color.name || "";
      nameInput.placeholder = `Color ${editingIndex + 1}`;
      nameInput.setAttribute("aria-label", "Color name");
      nameInput.addEventListener("change", () => {
        setEditingName(nameInput.value);
        nameInput.value = colors[editingIndex]?.name || "";
      });
      nameInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter") nameInput.blur();
      });
      editorFields.append(nameInput);

      const config = fieldConfig(editorMode.value, hex);
      const editorValues = { ...config.values };
      if (editorMode.value === "picker") {
        renderPickerEditor(config, editorValues);
      } else {
      config.fields.forEach(([key, label, min, max, step]) => {
        const row = document.createElement("div");
        row.className = "editor-field";

        const fieldLabel = document.createElement("label");
        fieldLabel.textContent = label;

        const range = document.createElement("input");
        range.type = "range";
        range.min = min;
        range.max = max;
        range.step = step;
        range.value = config.values[key];
        range.dataset.key = key;
        range.style.setProperty("--range-track", sliderTrack(editorMode.value, key, editorValues));
        range.style.setProperty("--range-accent", hex);

        const number = document.createElement("input");
        number.type = "number";
        number.min = min;
        number.max = max;
        number.step = step;
        number.value = config.values[key];
        number.setAttribute("aria-label", label);

        const applyValue = (value) => {
          const nextValues = { ...editorValues, [key]: clamp(value, min, max) };
          Object.assign(editorValues, nextValues);
          syncSliderTracks(editorMode.value, editorValues);
          setEditingColor(config.toHex(nextValues));
        };

        range.addEventListener("input", () => {
          number.value = range.value;
          applyValue(range.value);
        });
        number.addEventListener("change", () => {
          const nextValue = clamp(number.value, min, max);
          number.value = nextValue;
          range.value = nextValue;
          applyValue(nextValue);
        });
        row.append(fieldLabel, range, number);
        editorFields.append(row);
      });
      }

      const hexInput = document.createElement("input");
      hexInput.className = "editor-hex";
      hexInput.value = hex;
      hexInput.setAttribute("aria-label", "Hex color");
      hexInput.addEventListener("change", () => {
        const nextHex = normalizeHex(hexInput.value);
        if (!nextHex) {
          hexInput.value = hex;
          showToast("Use a valid hex color, like #47A8BD.");
          return;
        }
        setEditingColor(nextHex, true);
      });
      editorFields.append(hexInput);
    }

    function openEditor(index, anchorEl) {
      editingIndex = index;
      updateEditor(anchorEl);
    }

    function closeEditor() {
      editingIndex = null;
      editorEl.hidden = true;
    }

    function copyPaletteEntries(entries = colors) {
      return entries.map((color) => ({ ...color }));
    }

    function adjustmentValues() {
      return adjustmentRanges.reduce((values, input) => {
        values[input.dataset.adjustment] = Number(input.value);
        return values;
      }, { hue: 0, saturation: 0, brightness: 0, temperature: 0 });
    }

    function resetAdjustmentControls() {
      adjustmentRanges.forEach((input) => {
        input.value = 0;
      });
      adjustmentNumbers.forEach((input) => {
        input.value = 0;
      });
    }

    function syncAdjustmentControl(key, value) {
      const range = adjustmentRanges.find((input) => input.dataset.adjustment === key);
      const number = adjustmentNumbers.find((input) => input.dataset.adjustmentNumber === key);
      if (!range || !number) return;
      const nextValue = clamp(value, range.min, range.max);
      range.value = nextValue;
      number.value = nextValue;
    }

    function previewAdjustments() {
      const values = adjustmentValues();
      colors = adjustmentBaseColors.map((color) => ({
        ...color,
        hex: adjustedPaletteHex(color.hex, values)
      }));
      renderPalette();
      if (editingIndex !== null) updateEditor();
    }

    function openAdjustments() {
      closeEditor();
      adjustmentBaseColors = copyPaletteEntries();
      isAdjusting = true;
      resetAdjustmentControls();
      adjustmentModal.hidden = false;
      adjustCancelTopBtn.innerHTML = iconSvg("x");
      requestAnimationFrame(() => adjustmentRanges[0]?.focus());
    }

    function closeAdjustments({ restore = false } = {}) {
      if (restore && isAdjusting) {
        colors = copyPaletteEntries(adjustmentBaseColors);
        renderPalette();
      }
      adjustmentModal.hidden = true;
      adjustmentBaseColors = [];
      isAdjusting = false;
    }

    function applyAdjustments() {
      closeAdjustments();
      showToast("Palette adjustments applied.");
    }

    function getPaletteColors() {
      return colors.map((color) => ({
        hex: color.hex,
        name: color.name || ""
      }));
    }

    function paletteColorEntries(palette) {
      return Array.isArray(palette.colors)
        ? palette.colors.map((color) => ({ hex: color.hex, name: color.name || "" }))
        : palette.hexes.map((hex) => ({ hex, name: "" }));
    }

    function paletteSignature(entries) {
      return entries.map((color) => `${color.hex}:${color.name || ""}`).join("|");
    }

    function loadSavedPalettes() {
      try {
        const parsed = JSON.parse(localStorage.getItem(storageKey) || "[]");
        savedPalettes = Array.isArray(parsed)
          ? parsed
            .filter((palette) => Array.isArray(palette.hexes))
            .map((palette, index) => ({
              id: palette.id || Date.now() + index,
              name: palette.name || `Palette ${index + 1}`,
              hexes: palette.hexes,
              colors: Array.isArray(palette.colors)
                ? palette.colors.filter((color) => normalizeHex(color.hex)).map((color) => ({
                  hex: normalizeHex(color.hex),
                  name: color.name || ""
                }))
                : palette.hexes.map((hex) => ({ hex, name: "" }))
            }))
          : [];
      } catch {
        savedPalettes = [];
      }
    }

    function persistSavedPalettes() {
      localStorage.setItem(storageKey, JSON.stringify(savedPalettes));
    }

    function updateControls() {
      addBtn.disabled = colors.length >= maxColors;
      paletteEl.style.setProperty("--count", colors.length);
    }

    const harmonySchemes = [
      {
        id: "analogous",
        name: "Analogous",
        offsets: [-34, -18, 0, 18, 34, 48],
        saturation: 0,
        lightness: [0, 12, -12, 22, -22, 5]
      },
      {
        id: "complementary",
        name: "Complementary",
        offsets: [0, 180, -14, 166, 14, 194],
        saturation: 4,
        lightness: [0, 4, 18, -14, 26, -24]
      },
      {
        id: "split-complementary",
        name: "Split Complementary",
        offsets: [0, 150, 210, -10, 160, 200],
        saturation: 2,
        lightness: [0, 10, -10, 22, -18, 6]
      },
      {
        id: "triadic",
        name: "Triadic",
        offsets: [0, 120, 240, 14, 134, 254],
        saturation: -2,
        lightness: [0, 8, -8, 20, -18, 4]
      },
      {
        id: "tetradic",
        name: "Tetradic",
        offsets: [0, 60, 180, 240, 15, 195],
        saturation: -4,
        lightness: [0, 14, -10, 6, 24, -22]
      },
      {
        id: "monochrome",
        name: "Monochrome",
        offsets: [0, 0, 0, 0, 0, 0],
        saturation: -8,
        lightness: [-24, -10, 0, 14, 28, 38]
      }
    ];

    function selectedHarmonyScheme() {
      if (harmonySelect.value === "random") return pickRandom(harmonySchemes);
      return harmonySchemes.find((scheme) => scheme.id === harmonySelect.value) || harmonySchemes[0];
    }

    function paletteAnchor() {
      const lockedColor = colors.find((color) => color.locked);
      if (lockedColor) {
        const lockedHsl = rgbToHsl(hexToRgb(lockedColor.hex));
        return {
          h: lockedHsl.h,
          s: clamp(lockedHsl.s || 58, 38, 84),
          l: clamp(lockedHsl.l || 52, 32, 68)
        };
      }

      return {
        h: Math.round(randomBetween(0, 360)),
        s: Math.round(randomBetween(48, 78)),
        l: Math.round(randomBetween(40, 62))
      };
    }

    function makeUniqueHex(hsl, usedHexes) {
      let nextHsl = { ...hsl };
      let hex = hslToHex(nextHsl);
      let attempts = 0;
      while (usedHexes.has(hex) && attempts < 12) {
        attempts += 1;
        nextHsl = {
          ...nextHsl,
          h: wrapHue(nextHsl.h + 9 * attempts),
          l: clamp(nextHsl.l + (attempts % 2 ? 4 : -4), 18, 86)
        };
        hex = hslToHex(nextHsl);
      }
      usedHexes.add(hex);
      return hex;
    }

    function generateSmartPaletteHexes() {
      const scheme = selectedHarmonyScheme();
      const anchor = paletteAnchor();
      const usedHexes = new Set(colors.filter((color) => color.locked).map((color) => color.hex));
      let unlockedIndex = 0;

      return colors.map((color, index) => {
        if (color.locked) return color.hex;

        const offset = scheme.offsets[unlockedIndex % scheme.offsets.length];
        const lightnessShift = scheme.lightness[(index + unlockedIndex) % scheme.lightness.length];
        const nextHsl = {
          h: wrapHue(anchor.h + offset + randomBetween(-5, 5)),
          s: Math.round(shiftedValue(anchor.s + scheme.saturation, 8, 32, 88)),
          l: Math.round(shiftedValue(anchor.l + lightnessShift, 5, 18, 84))
        };

        unlockedIndex += 1;
        return makeUniqueHex(nextHsl, usedHexes);
      });
    }

    function nextRelatedColorHex() {
      if (!colors.length) return randomHex();
      const anchorColor = colors[colors.length - 1];
      const anchorHsl = rgbToHsl(hexToRgb(anchorColor.hex));
      const offset = pickRandom([-28, -16, 16, 28, 150, 180, 210]);
      return hslToHex({
        h: wrapHue(anchorHsl.h + offset + randomBetween(-4, 4)),
        s: Math.round(shiftedValue(anchorHsl.s || 58, 10, 34, 86)),
        l: Math.round(shiftedValue(anchorHsl.l || 52, 14, 22, 82))
      });
    }

    function createDragPreview(color, index) {
      const displayHex = previewHex(color.hex);
      const preview = document.createElement("div");
      preview.className = "drag-preview";
      preview.style.setProperty("--drag-color", displayHex);
      preview.style.setProperty("--drag-label-color", getContrastColor(displayHex));

      const name = document.createElement("strong");
      name.textContent = colorDisplayName(color, index);

      const hex = document.createElement("span");
      hex.textContent = color.hex;

      preview.append(name, hex);
      document.body.append(preview);
      return preview;
    }

    function moveColor(fromIndex, toIndex) {
      if (fromIndex === toIndex || fromIndex < 0 || toIndex < 0) return;
      const [movedColor] = colors.splice(fromIndex, 1);
      colors.splice(toIndex, 0, movedColor);
      if (editingIndex === fromIndex) editingIndex = toIndex;
      else if (editingIndex !== null && fromIndex < editingIndex && toIndex >= editingIndex) editingIndex -= 1;
      else if (editingIndex !== null && fromIndex > editingIndex && toIndex <= editingIndex) editingIndex += 1;
      renderPalette();
      if (editingIndex !== null) updateEditor();
    }

    function renderPalette() {
      paletteEl.innerHTML = "";
      colors.forEach((color, index) => {
        const swatch = document.createElement("article");
        const displayHex = previewHex(color.hex);
        const labelColor = getContrastColor(displayHex);
        swatch.className = `swatch${isLight(displayHex) ? " dark-ui" : ""}`;
        swatch.dataset.colorIndex = String(index);
        swatch.draggable = true;
        swatch.style.setProperty("--swatch-color", displayHex);
        swatch.style.setProperty("--label-color", labelColor);

        swatch.addEventListener("click", (event) => {
          if (event.target.closest("button, input")) return;
          if (didDragColor) {
            didDragColor = false;
            return;
          }
          openEditor(index, swatch);
        });

        swatch.addEventListener("dragstart", (event) => {
          if (event.target.closest("button, input")) {
            event.preventDefault();
            return;
          }
          draggedColorIndex = index;
          didDragColor = true;
          swatch.classList.add("dragging");
          event.dataTransfer.effectAllowed = "move";
          event.dataTransfer.setData("text/plain", String(index));
          const preview = createDragPreview(color, index);
          event.dataTransfer.setDragImage(preview, 61, 34);
          requestAnimationFrame(() => preview.remove());
        });

        swatch.addEventListener("dragover", (event) => {
          if (draggedColorIndex === null || draggedColorIndex === index) return;
          event.preventDefault();
          swatch.classList.add("drag-over");
          event.dataTransfer.dropEffect = "move";
        });

        swatch.addEventListener("dragleave", () => {
          swatch.classList.remove("drag-over");
        });

        swatch.addEventListener("drop", (event) => {
          event.preventDefault();
          swatch.classList.remove("drag-over");
          const fromIndex = draggedColorIndex ?? Number(event.dataTransfer.getData("text/plain"));
          draggedColorIndex = null;
          moveColor(fromIndex, index);
        });

        swatch.addEventListener("dragend", () => {
          draggedColorIndex = null;
          swatch.classList.remove("dragging", "drag-over");
          setTimeout(() => {
            didDragColor = false;
          }, 0);
        });

        const actions = document.createElement("div");
        actions.className = "swatch-actions";

        const lockBtn = document.createElement("button");
        lockBtn.className = "button icon";
        lockBtn.type = "button";
        lockBtn.title = color.locked ? "Unlock color" : "Lock color";
        lockBtn.setAttribute("aria-label", lockBtn.title);
        lockBtn.innerHTML = color.locked ? iconSvg("lock") : iconSvg("unlock");
        lockBtn.addEventListener("click", () => {
          color.locked = !color.locked;
          renderPalette();
        });

        const copyBtn = document.createElement("button");
        copyBtn.className = "button icon copy-hex-button";
        copyBtn.type = "button";
        copyBtn.title = `Copy ${color.hex}`;
        copyBtn.setAttribute("aria-label", `Copy ${color.hex}`);
        copyBtn.innerHTML = iconSvg("clipboard");
        copyBtn.addEventListener("click", () => copyText(color.hex));

        const deleteBtn = document.createElement("button");
        deleteBtn.className = "button icon";
        deleteBtn.type = "button";
        deleteBtn.title = "Remove color";
        deleteBtn.setAttribute("aria-label", "Remove color");
        deleteBtn.innerHTML = iconSvg("x");
        deleteBtn.disabled = colors.length <= minColors;
        deleteBtn.addEventListener("click", () => {
          if (editingIndex === index) closeEditor();
          if (editingIndex !== null && editingIndex > index) editingIndex -= 1;
          colors.splice(index, 1);
          renderPalette();
        });

        actions.append(lockBtn, copyBtn, deleteBtn);

        const info = document.createElement("div");
        info.className = "color-info";

        if (color.name?.trim()) {
          const name = document.createElement("div");
          name.className = "swatch-name";
          name.textContent = color.name.trim();
          info.append(name);
        }

        const hexButton = document.createElement("button");
        hexButton.className = "hex-field";
        hexButton.type = "button";
        hexButton.textContent = color.hex;
        hexButton.setAttribute("aria-label", `Copy ${color.hex}`);
        hexButton.title = "Copy hex code";
        hexButton.addEventListener("click", () => {
          copyText(color.hex);
        });

        const rgbValue = document.createElement("div");
        rgbValue.className = "rgb-value";
        rgbValue.textContent = rgbText(color.hex);

        info.append(hexButton, rgbValue);
        swatch.append(actions, info);
        paletteEl.append(swatch);
      });
      updateControls();
    }

    function renderSavedPalettes() {
      savedListEl.innerHTML = "";
      if (!savedPalettes.length) {
        const empty = document.createElement("p");
        empty.className = "empty-state";
        empty.textContent = "No saved palettes yet. Save the current palette when you find a keeper.";
        savedListEl.append(empty);
        return;
      }

      savedPalettes.forEach((palette, index) => {
        const card = document.createElement("article");
        card.className = "saved-card";

        const strip = document.createElement("div");
        strip.className = "saved-strip";
        const savedColors = paletteColorEntries(palette);
        const savedHexes = savedColors.map((color) => color.hex);
        strip.style.setProperty("--saved-count", savedColors.length);
        savedColors.forEach(({ hex }) => {
          const color = document.createElement("div");
          color.style.background = previewHex(hex);
          strip.append(color);
        });

        const meta = document.createElement("div");
        meta.className = "saved-meta";

        const top = document.createElement("div");
        top.className = "saved-top";

        const title = document.createElement("input");
        title.className = "saved-name-field";
        title.value = palette.name || `Palette ${savedPalettes.length - index}`;
        title.dataset.paletteId = String(palette.id);
        title.setAttribute("aria-label", "Saved palette name");
        title.addEventListener("change", () => {
          const fallback = `Palette ${savedPalettes.length - index}`;
          palette.name = title.value.trim() || fallback;
          title.value = palette.name;
          persistSavedPalettes();
          showToast("Palette renamed.");
        });
        title.addEventListener("keydown", (event) => {
          if (event.key === "Enter") {
            title.blur();
          }
        });

        const hexes = document.createElement("p");
        hexes.className = "saved-hexes";
        hexes.textContent = savedColors.map((color) => color.name ? `${color.name}: ${color.hex}` : color.hex).join("  ");

        const actions = document.createElement("div");
        actions.className = "saved-actions";

        const applyBtn = document.createElement("button");
        applyBtn.className = "button";
        applyBtn.type = "button";
        applyBtn.textContent = "Apply";
        applyBtn.addEventListener("click", () => {
          colors = savedColors.map((color) => ({ hex: color.hex, name: color.name || "", locked: false }));
          closeEditor();
          renderPalette();
          showToast("Palette applied.");
        });

        const deleteBtn = document.createElement("button");
        deleteBtn.className = "button danger";
        deleteBtn.type = "button";
        deleteBtn.textContent = "Delete";
        deleteBtn.addEventListener("click", () => {
          savedPalettes.splice(index, 1);
          persistSavedPalettes();
          renderSavedPalettes();
          showToast("Saved palette deleted.");
        });

        actions.append(applyBtn, deleteBtn);
        top.append(title, actions);
        meta.append(top, hexes);
        card.append(strip, meta);
        savedListEl.append(card);
      });
    }

    function generatePalette() {
      if (isAdjusting) closeAdjustments();
      const nextHexes = generateSmartPaletteHexes();
      colors = colors.map((color, index) => color.locked ? color : { ...color, hex: nextHexes[index], name: "" });
      renderPalette();
      if (editingIndex !== null) updateEditor();
    }

    function addColor() {
      if (isAdjusting) closeAdjustments();
      if (colors.length >= maxColors) return;
      colors.push({ hex: nextRelatedColorHex(), name: "", locked: false });
      renderPalette();
    }

    function savePalette() {
      const paletteColors = getPaletteColors();
      const hexes = paletteColors.map((color) => color.hex);
      const duplicate = savedPalettes.some((palette) => paletteSignature(paletteColorEntries(palette)) === paletteSignature(paletteColors));
      if (duplicate) {
        showToast("That palette is already saved.");
        return;
      }

      const id = Date.now();
      savedPalettes.unshift({
        id,
        name: `Palette ${savedPalettes.length + 1}`,
        hexes,
        colors: paletteColors
      });
      persistSavedPalettes();
      renderSavedPalettes();
      const nameField = savedListEl.querySelector(`[data-palette-id="${id}"]`);
      if (nameField) {
        nameField.focus();
        nameField.select();
      }
      showToast("Palette saved.");
    }

    function loadSvgImage(svgElement) {
      return new Promise((resolve, reject) => {
        const clone = svgElement.cloneNode(true);
        clone.removeAttribute("class");
        clone.setAttribute("width", "438");
        clone.setAttribute("height", "45");
        const svgText = new XMLSerializer().serializeToString(clone);
        const image = new Image();
        image.onload = () => resolve(image);
        image.onerror = reject;
        image.src = `data:image/svg+xml;charset=utf-8,${encodeURIComponent(svgText)}`;
      });
    }

    async function exportImage() {
      const width = 1600;
      const colorHeight = 900;
      const footerHeight = 130;
      const height = colorHeight + footerHeight;
      const canvas = document.createElement("canvas");
      const ctx = canvas.getContext("2d");
      canvas.width = width;
      canvas.height = height;

      const swatchWidth = width / colors.length;
      colors.forEach((color, index) => {
        const x = index * swatchWidth;
        ctx.fillStyle = color.hex;
        ctx.fillRect(x, 0, Math.ceil(swatchWidth), colorHeight);

        ctx.fillStyle = getContrastColor(color.hex);
        const fontSize = colors.length > 8 ? 18 : colors.length > 6 ? 22 : 28;
        const lineHeight = fontSize * 1.35;
        const labelLines = [
          colorDisplayName(color, index),
          color.hex,
          rgbText(color.hex),
          hslText(color.hex)
        ];
        ctx.font = `700 ${fontSize}px Arial, sans-serif`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.shadowColor = getContrastColor(color.hex) === "#FFFFFF" ? "rgba(0, 0, 0, 0.28)" : "rgba(255, 255, 255, 0.24)";
        ctx.shadowBlur = 10;
        const bottomPadding = 58;
        const startY = colorHeight - bottomPadding - ((labelLines.length - 1) * lineHeight);
        labelLines.forEach((line, lineIndex) => {
          ctx.font = `${lineIndex === 0 ? 700 : 500} ${fontSize}px Arial, sans-serif`;
          ctx.fillText(line, x + swatchWidth / 2, startY + lineIndex * lineHeight, Math.max(96, swatchWidth - 18));
        });
        ctx.shadowBlur = 0;
      });

      ctx.fillStyle = "#ffffff";
      ctx.fillRect(0, colorHeight, width, footerHeight);
      try {
        const logo = await loadSvgImage(document.querySelector(".brand-logo-light"));
        const logoMaxWidth = 360;
        const logoMaxHeight = 54;
        const logoAspect = 438 / 45;
        let logoWidth = logoMaxWidth;
        let logoHeight = logoWidth / logoAspect;
        if (logoHeight > logoMaxHeight) {
          logoHeight = logoMaxHeight;
          logoWidth = logoHeight * logoAspect;
        }
        ctx.drawImage(logo, (width - logoWidth) / 2, colorHeight + (footerHeight - logoHeight) / 2, logoWidth, logoHeight);
      } catch {
        ctx.fillStyle = "#15171c";
        ctx.font = "700 34px Arial, sans-serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText("Palette Generator", width / 2, colorHeight + footerHeight / 2);
      }

      const link = document.createElement("a");
      link.download = `palette-${Date.now()}.png`;
      link.href = canvas.toDataURL("image/png");
      link.click();
      showToast("Palette exported as PNG.");
    }

    generateBtn.addEventListener("click", generatePalette);
    addBtn.addEventListener("click", addColor);
    filtersBtn.addEventListener("click", openFilters);
    adjustBtn.addEventListener("click", openAdjustments);
    saveBtn.addEventListener("click", savePalette);
    exportBtn.addEventListener("click", exportImage);
    harmonySelect.addEventListener("change", persistPreviewControls);
    themeBtn.addEventListener("click", toggleTheme);
    adjustCancelTopBtn.addEventListener("click", () => closeAdjustments({ restore: true }));
    adjustCancelBtn.addEventListener("click", () => closeAdjustments({ restore: true }));
    adjustApplyBtn.addEventListener("click", applyAdjustments);
    filterCancelTopBtn.addEventListener("click", () => closeFilters({ restore: true }));
    filterCancelBtn.addEventListener("click", () => closeFilters({ restore: true }));
    filterApplyBtn.addEventListener("click", applyFilter);
    filterOptions.forEach((option) => {
      option.addEventListener("change", () => {
        activeFilter = option.value;
        refreshPreview();
        syncFilterControls();
      });
    });
    adjustmentRanges.forEach((input) => {
      input.addEventListener("input", () => {
        syncAdjustmentControl(input.dataset.adjustment, input.value);
        previewAdjustments();
      });
    });
    adjustmentNumbers.forEach((input) => {
      input.addEventListener("input", () => {
        syncAdjustmentControl(input.dataset.adjustmentNumber, input.value);
        previewAdjustments();
      });
    });
    editorMode.addEventListener("change", () => updateEditor());
    editorCloseBtn.addEventListener("click", closeEditor);
    document.addEventListener("pointerdown", (event) => {
      if (editorEl.hidden) return;
      if (editorEl.contains(event.target)) return;
      closeEditor();
    });
    window.addEventListener("resize", () => {
      if (editingIndex !== null) positionEditor();
    });
    window.addEventListener("scroll", () => {
      if (editingIndex !== null) positionEditor();
    }, { passive: true });
    window.addEventListener("keydown", (event) => {
      if (event.key === "Escape") {
        if (!filterModal.hidden) {
          closeFilters({ restore: true });
          return;
        }
        if (!adjustmentModal.hidden) {
          closeAdjustments({ restore: true });
          return;
        }
        closeEditor();
      }
      const activeTag = document.activeElement.tagName;
      if (event.code === "Space" && !["INPUT", "TEXTAREA"].includes(activeTag)) {
        event.preventDefault();
        if (activeTag === "SELECT") document.activeElement.blur();
        generatePalette();
      }
    });

    setToolbarIcons();
    loadSavedPalettes();
    loadTheme();
    loadGeneratorControls();
    colors = Array.from({ length: 5 }, () => ({ hex: "", name: "", locked: false }));
    colors = generateSmartPaletteHexes().map((hex) => ({ hex, name: "", locked: false }));
    renderPalette();
    renderSavedPalettes();
  </script>
</body>
</html>
